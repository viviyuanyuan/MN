<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{font-family:'Microsoft YaHei','PingFang SC',sans-serif;background:#eaf2fb;color:#2c4a6e;min-height:100vh;width:100%;overflow-x:hidden}
.dashboard{margin:0 auto;padding:18px 12px 40px;width:100%;max-width:1920px;min-width:320px}
.header{text-align:left;margin-bottom:14px;background:linear-gradient(135deg,#1565c0,#1976d2);border-radius:10px;padding:16px 12px;box-shadow:0 2px 10px rgba(21,101,192,0.3);position:relative}
.header h1{font-size:22px;font-weight:700;color:#fff;letter-spacing:2px}
.subtitle{font-size:13px;color:rgba(255,255,255,0.85);margin-top:6px;font-weight:500}
.update-time{font-size:11px;color:rgba(255,255,255,0.6);margin-top:4px}
.upload-btn{position:absolute;top:12px;right:12px;padding:8px 10px;background:rgba(255,255,255,0.2);color:#fff;border:1px solid rgba(255,255,255,0.4);border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;transition:all .3s;font-family:inherit;backdrop-filter:blur(4px)}
.upload-btn:hover{background:rgba(255,255,255,0.35);border-color:rgba(255,255,255,0.6)}
.upload-btn:active{transform:scale(0.97)}
.upload-btn.uploading{background:rgba(76,175,80,0.4);border-color:#66bb6a;pointer-events:none}
@media(max-width:600px){.upload-btn{top:8px;right:8px;padding:6px 12px;font-size:12px}.header h1{font-size:18px}}

.filter-bar{display:flex;gap:10px;justify-content:center;margin-bottom:14px;flex-wrap:wrap}
.filter-btn{padding:6px 24px;border:1.5px solid #90caf9;background:#fff;color:#1976d2;border-radius:6px;font-size:13px;cursor:pointer;transition:all .25s;font-family:inherit;box-shadow:0 1px 4px rgba(21,101,192,0.1)}
.filter-btn:hover{border-color:#1976d2;background:#e3f2fd;color:#1565c0}
.filter-btn.active{background:linear-gradient(135deg,#1565c0,#1976d2);border-color:#1976d2;color:#fff;box-shadow:0 2px 10px rgba(21,101,192,0.35)}
@media(max-width:500px){.filter-btn{padding:5px 16px;font-size:12px}}

/* 小屏幕时切片器固定在页面底部 */
#product-filter-bottom,#dept-filter-bottom{display:none}
#bottom-filter-wrap{display:none}
@media(max-width:900px){
  /* 桌面端的两组顶部切片器在小屏隐藏 */
  #product-filter,#dept-filter{display:none}
  /* 两组底部切片器合并为一个固定容器 */
  #bottom-filter-wrap{display:block;position:fixed;left:0;right:0;bottom:0;z-index:100;background:#fff;box-shadow:0 -2px 12px rgba(21,101,192,0.15)}
  #product-filter-bottom,#dept-filter-bottom{display:flex;padding:6px 12px;gap:8px}
  #product-filter-bottom{background:#f5f9fd;box-shadow:none}
  #dept-filter-bottom{background:#f5f9fd}
  .dashboard{padding-bottom:105px}
}

.kpi-row{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:14px;width:100%}
@media(max-width:1200px){.kpi-row{grid-template-columns:repeat(3,1fr)}}
@media(max-width:600px){.kpi-row{grid-template-columns:repeat(2,1fr)}}
@media(max-width:400px){.kpi-row{grid-template-columns:1fr 1fr;gap:8px}}

/* 面板区域与 KPI 行严格对齐 */
.grid-main{width:100%;min-width:0}
@media(max-width:1200px){.grid-main{width:100%;min-width:0}}
@media(max-width:900px){.grid-main{width:100%;min-width:0}}
@media(max-width:600px){.grid-main{width:100%;min-width:0}}

.kpi-card{background:#fff;border:1px solid #bbdefb;border-radius:10px;padding:14px 12px;box-shadow:0 1px 6px rgba(21,101,192,0.08);transition:transform .2s}
.kpi-card:hover{transform:translateY(-2px);box-shadow:0 4px 14px rgba(21,101,192,0.15)}
.kpi-card .label{font-size:11px;color:#78909c;margin-bottom:5px;white-space:nowrap}
.kpi-card .value{font-size:22px;font-weight:700}
.kpi-card .unit{font-size:10px;color:#b0bec5;margin-top:3px}
.kpi-card.blue .value{color:#1565c0}
.kpi-card.green .value{color:#1b5e20}
.kpi-card.orange .value{color:#e65100}
.kpi-card.teal .value{color:#00695c}
.kpi-card.purple .value{color:#4a148c}

.panel{background:#fff;border:1px solid #bbdefb;border-radius:10px;padding:14px 16px;box-shadow:0 1px 6px rgba(21,101,192,0.08);min-width:0}
.panel-title{font-size:13px;font-weight:600;color:#1565c0;margin-bottom:10px;padding-left:8px;border-left:3px solid #1976d2}
.chart-container{width:100%;height:280px}
.chart-container-sm{width:100%;height:320px}
@media(max-width:600px){
  .chart-container{height:220px;min-width:0}
  .chart-container-sm{height:auto;min-width:0}
}

.grid-main{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.full-width{grid-column:1/-1}
@media(max-width:900px){.grid-main{grid-template-columns:1fr}.full-width{grid-column:auto}}

.progress-bar{height:16px;background:#e0e0e0;border-radius:8px;overflow:hidden}
.progress-fill{height:100%;border-radius:8px;transition:width .6s;background:linear-gradient(90deg,#1565c0,#42a5f5)}
.progress-fill.over{background:linear-gradient(90deg,#2e7d32,#66bb6a)}
.progress-fill.low{background:linear-gradient(90deg,#e65100,#ff9800)}

.target-table{width:100%;border-collapse:collapse;font-size:12px}
.target-table th{background:#e3f2fd;color:#1565c0;padding:8px 6px;text-align:center;font-weight:600;border-bottom:2px solid #90caf9;position:sticky;top:0;z-index:1;white-space:nowrap}
.target-table td{padding:6px;border-bottom:1px solid #e3f2fd}
.target-table .num{text-align:center;font-variant-numeric:tabular-nums}
.target-table .left{text-align:left}
.target-table .rank{text-align:center}
.table-wrap{max-height:500px;overflow-y:auto;overflow-x:auto;border-radius:8px;-webkit-overflow-scrolling:touch}
.table-wrap table{min-width:600px}
@media(max-width:600px){.target-table{font-size:10px}.target-table th,.target-table td{padding:4px 3px;white-space:nowrap}.table-wrap{max-height:350px}.table-wrap table{min-width:480px}}
.rate-up{color:#1b5e20;font-weight:600}
.rate-down{color:#c62828;font-weight:600}
</style>
</head>

  </div>

  <div id="bottom-filter-wrap">

    <div class="filter-bar" id="dept-filter-bottom"></div>

</div>

function initFilters(){
  var containers=[
    {barId:'product-filter',botId:'product-filter-bottom',list:products,isProduct:true},
    {barId:'dept-filter',botId:'dept-filter-bottom',list:depts,isProduct:false}
  ];
  containers.forEach(function(cfg){
    [cfg.barId,cfg.botId].forEach(function(bid){
      var bar=document.getElementById(bid);
      if(!bar) return;
      cfg.list.forEach(function(item){
        var icon='';
        if(cfg.isProduct){
          if(item==='\u6ccc\u5c3f\u7ec4\u6574\u4f53') icon='\ud83c\udfe5 ';
          else if(item==='\u8418\u54cc\u5730\u5c14') icon='<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" style="vertical-align:middle;margin-right:2px"><rect x="2" y="9" width="20" height="6" rx="3" fill="#00C47D" transform="rotate(120 12 12)"/></svg> ';
          else if(item==='\u708e\u7425\u5b8180mg') icon='\ud83d\udc89 ';
        }
        var curVal=cfg.isProduct?curProduct:curDept;
        var b=document.createElement('button');
        b.className='filter-btn'+(item===curVal?' active':'');
        b.innerHTML=icon+item;
        b.dataset.value=item;
        b.onclick=function(){
          if(cfg.isProduct){curProduct=item;}else{curDept=item;}
          updateFilters();updateAll();
        };
        bar.appendChild(b);
      });
    });
  });
}

  });

  // QOQ: 近90天 vs 前90天
  var qoq=null;
  if(DATA.rows&&DATA.rows.length>0){
    var allTimes=DATA.rows.map(function(r){return r.d;});
    var maxTime=Math.max.apply(null,allTimes);
    var recentAmt=0,prevAmt=0;
    var endTime=maxTime,startRecent=endTime-89*864e5,startPrev=endTime-90*864e5,endPrev=endTime-180*864e5;
    DATA.rows.forEach(function(r){
      if(curProduct!=='\u6ccc\u5c3f\u7ec4\u6574\u4f53'&&r.p!==curProduct)return;
      if(curDept!=='\u5168\u6e20\u9053'&&r.s!==curDept)return;
      if(r.d>=startRecent&&r.d<=endTime){recentAmt+=r.a||0;}
      else if(r.d>=endPrev&&r.d<startPrev){prevAmt+=r.a||0;}
    });
    qoq=prevAmt>0?(recentAmt-prevAmt)/prevAmt:null;
  }
  document.getElementById('kpi-target-amt').textContent=gA>=1e4?(gA/1e4).toFixed(0):(gA/1e4).toFixed(2);
  document.getElementById('kpi-amt').textContent=tA>=1e4?(tA/1e4).toFixed(0):(tA/1e4).toFixed(2);
  // 金额完成率：对比当月应有进度
  document.getElementById('kpi-rate').textContent=fmtPct(rate);
  document.getElementById('kpi-rate').style.color=getRateColor(rate,maxM);
  document.getElementById('kpi-yoy').textContent=fmtPct(yoy);
  document.getElementById('kpi-yoy').style.color=yoy>=0?'#1b5e20':'#c62828';
  document.getElementById('kpi-yoy-arrow').textContent=yoy>0?'\u2191':yoy<0?'\u2193':'';
  document.getElementById('kpi-qoq').textContent=fmtPct(qoq);
  document.getElementById('kpi-qoq').style.color=qoq>=0?'#1b5e20':'#c62828';
  document.getElementById('kpi-qoq-arrow').textContent=qoq>0?'\u2191':qoq<0?'\u2193':'';
  document.getElementById('kpi-qty').textContent=(tQ/1e4).toFixed(1);
}

  ]});

function updateTargetTable(){
  var rg=fA(DATA.region_rank),tg=fA(DATA.task_region),rMap={};
  rg.forEach(function(r){var k=r['\u5730\u533a'];if(!rMap[k])rMap[k]={a:0,q:0,tA:0,tQ:0};rMap[k].a+=r.amt||0;rMap[k].q+=r.qty||0;});
  tg.forEach(function(r){var k=r['\u5730\u533a'];if(!rMap[k])rMap[k]={a:0,q:0,tA:0,tQ:0};rMap[k].tA+=r.target_amt||0;rMap[k].tQ+=r.target_qty||0;});
  var sorted=Object.keys(rMap).filter(function(k){return rMap[k].tA>0;}).map(function(n){var d=rMap[n];return{name:n,a:d.a,q:d.q,tA:d.tA,tQ:d.tQ,aR:d.tA>0?d.a/d.tA:0,qR:d.tQ>0?d.q/d.tQ:0};}).sort(function(a,b){return b.a-a.a;});
  // 当月应有进度基准（月份/12）
  var maxM=Math.max.apply(null,fA(DATA.monthly).filter(function(r){return r.year===2026;}).map(function(r){return r['\u6708\u4efd'];}).concat([0]));
  var expected=Math.min(maxM/12,1);
  // 合计包含所有有发货金额的地区（不管有没有目标）
  var tA=0,tQ=0,tTA=0,tTQ=0;Object.keys(rMap).forEach(function(k){tA+=rMap[k].a||0;tQ+=rMap[k].q||0;tTA+=rMap[k].tA||0;tTQ+=rMap[k].tQ||0;});
  var fw=function(v){return v>=10000?(v/10000).toFixed(1):(v/10000).toFixed(2);};
  var html='';
  sorted.forEach(function(d,i){
    var medals=['\ud83e\udd47','\ud83e\udd48','\ud83e\udd49'],medal=medals[i]||(i+1);
    // 达成率颜色：对比当月应有进度
    var aColor=getRateColor(d.aR,maxM),qColor=getRateColor(d.qR,maxM);
    // 进度条颜色：实际达成>=基准绿色，否则红色
    var aBar=d.aR>=expected?'over':'low',qBar=d.qR>=expected?'over':'low';
    var bw=Math.min(d.aR*100,100),qbw=Math.min(d.qR*100,100);
    html+='<tr><td class="rank">'+(i<3?'<span style="font-size:15px">'+medal+'</span>':'<span style="color:#78909c;font-size:12px">'+(i+1)+'</span>')+'</td><td class="num">'+d.name+'</td><td class="num" style="color:#1b5e20">'+fw(d.a)+'</td><td class="num">'+(d.tA>=10000?(d.tA/10000).toFixed(1):(d.tA/10000).toFixed(2))+'</td><td class="num" style="color:'+aColor+'">'+(d.aR*100).toFixed(1)+'%</td><td style="min-width:70px"><div class="progress-bar"><div class="progress-fill '+aBar+'" style="width:'+bw+'%"></div></div></td><td class="num">'+fw(d.q)+'</td><td class="num">'+(d.tQ>=10000?(d.tQ/10000).toFixed(1):(d.tQ/10000).toFixed(2))+'</td><td class="num" style="color:'+qColor+'">'+(d.qR*100).toFixed(1)+'%</td></tr>';
  });
  var tr=tTA>0?tA/tTA:0,tqr=tTQ>0?tQ/tTQ:0;
  var trColor=getRateColor(tr,maxM),tqrColor=getRateColor(tqr,maxM);
  html+='<tr style="background:#e3f2fd;font-weight:700"><td></td><td class="num">\u5408\u8ba1</td><td class="num" style="color:#1b5e20">'+fw(tA)+'</td><td class="num">'+(tTA>=10000?(tTA/10000).toFixed(1):(tTA/10000).toFixed(2))+'</td><td class="num" style="color:'+trColor+'">'+(tr*100).toFixed(1)+'%</td><td><div class="progress-bar"><div class="progress-fill '+(tr>=expected?'over':'low')+'" style="width:'+Math.min(tr*100,100)+'%"></div></div></td><td class="num">'+fw(tQ)+'</td><td class="num">'+(tTQ>=10000?(tTQ/10000).toFixed(1):(tTQ/10000).toFixed(2))+'</td><td class="num" style="color:'+tqrColor+'">'+(tqr*100).toFixed(1)+'%</td></tr>';
  document.getElementById('target-tbody').innerHTML=html;
  document.getElementById('target-title').textContent='\u76ee\u6807\u8fbe\u6210\u6392\u540d - '+curProduct+' / '+curDept;
}
