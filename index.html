<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>泌尿组2026年销售看板</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
  background: #eaf2fb;
  color: #2c4a6e;
  min-height: 100vh;
}
.dashboard {
  margin: 0 auto;
  padding: 18px 12px 40px;
  width: 100%;
  max-width: 1920px;
  min-width: auto;
  overflow-x: hidden;
}
.header {
  text-align: left;
  margin-bottom: 14px;
  background: linear-gradient(135deg, #1565c0, #1976d2);
  border-radius: 10px;
  padding: 16px 12px;
  box-shadow: 0 2px 10px rgba(21,101,192,0.3);
  position: relative;
  width: 100%;
  min-width: 100%;
  box-sizing: border-box;
  flex-shrink: 0;
}
.header h1 {
  font-size: 22px;
  font-weight: 700;
  color: #ffffff;
  letter-spacing: 2px;
}
.subtitle {
  font-size: 13px;
  color: rgba(255,255,255,0.85);
  margin-top: 6px;
  font-weight: 500;
}
.update-time { font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 4px; }

/* 刷新按钮 */
#refresh-btn {
  position: absolute;
  bottom: 12px;
  right: 12px;
  padding: 8px 16px;
  background: rgba(255,255,255,0.2);
  color: white;
  border: 1px solid rgba(255,255,255,0.4);
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.3s ease;
  font-family: inherit;
  backdrop-filter: blur(4px);
}
#refresh-btn:hover {
  background: rgba(255,255,255,0.35);
  border-color: rgba(255,255,255,0.6);
  transform: translateY(-1px);
}
#refresh-btn:active {
  transform: translateY(0);
}

/* 切片器 */
.filter-bar {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-bottom: 16px;
}
.filter-btn {
  padding: 5px 22px;
  border: 1.5px solid #90caf9;
  background: #ffffff;
  color: #1976d2;
  border-radius: 20px;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.25s;
  font-family: inherit;
  box-shadow: 0 1px 4px rgba(21,101,192,0.1);
}
.filter-btn:hover { border-color: #1976d2; background: #e3f2fd; color: #1565c0; }
.filter-btn.active {
  background: linear-gradient(135deg, #1565c0, #1976d2);
  border-color: #1976d2;
  color: #fff;
  box-shadow: 0 2px 10px rgba(21,101,192,0.35);
}

/* 产品切片器 */
.product-filter-btn {
  padding: 3px 12px;
  border: 1px solid #90caf9;
  background: #ffffff;
  color: #1976d2;
  border-radius: 12px;
  font-size: 11px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
}
.product-filter-btn:hover { border-color: #1976d2; background: #e3f2fd; }
.product-filter-btn.active {
  background: linear-gradient(135deg, #1565c0, #1976d2);
  border-color: #1976d2;
  color: #fff;
}

/* 布局 - 响应式网格 */
.grid-main {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  width: 100%;
  min-width: 100%;
  box-sizing: border-box;
}
/* 窗口小于1400px时，主网格变为3列 */
@media screen and (max-width: 1400px) {
  .grid-main {
    grid-template-columns: repeat(3, 1fr);
  }
  .col-4 {
    grid-column: span 3;
  }
}
/* 窗口小于1024px时，主网格变为2列 */
@media screen and (max-width: 1024px) {
  .grid-main {
    grid-template-columns: repeat(2, 1fr);
  }
  .col-4, .col-3, .col-2 {
    grid-column: span 2;
  }
}
/* 窗口小于768px时，主网格变为1列 */
@media screen and (max-width: 768px) {
  .grid-main {
    grid-template-columns: 1fr;
  }
  .col-4, .col-3, .col-2 {
    grid-column: span 1;
  }
}
.kpi-row {
  grid-column: 1 / -1;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
}
/* 窗口小于1200px时，KPI卡片变成2排（每排2个） */
@media screen and (max-width: 1200px) {
  .kpi-row {
    grid-template-columns: repeat(2, 1fr);
  }
}
/* 窗口小于600px时，KPI卡片变成1列垂直排列 */
@media screen and (max-width: 600px) {
  .kpi-row {
    grid-template-columns: 1fr;
  }
}
.kpi-card {
  background: #ffffff;
  border: 1px solid #bbdefb;
  border-radius: 10px;
  padding: 14px 18px;
  box-shadow: 0 1px 6px rgba(21,101,192,0.08);
  transition: transform 0.2s, box-shadow 0.2s;
}
.kpi-card:hover { transform: translateY(-2px); box-shadow: 0 4px 14px rgba(21,101,192,0.15); }
.kpi-card .label { font-size: 12px; color: #78909c; margin-bottom: 6px; }
.kpi-card .value { font-size: 26px; font-weight: 700; color: #1565c0; }
.kpi-card .unit { font-size: 11px; color: #b0bec5; margin-top: 3px; }
.kpi-card.blue .value { color: #1565c0; }
.kpi-card.green .value { color: #1b5e20; }
.kpi-card.orange .value { color: #e65100; }
.kpi-card.red .value { color: #00695c; }

/* 面板 */
.panel {
  background: #ffffff;
  border: 1px solid #bbdefb;
  border-radius: 10px;
  padding: 14px 16px;
  box-shadow: 0 1px 6px rgba(21,101,192,0.08);
}
.panel-title {
  font-size: 13px;
  font-weight: 600;
  color: #1565c0;
  margin-bottom: 10px;
  padding-left: 8px;
  border-left: 3px solid #1976d2;
}
.col-2 { grid-column: span 2; }
.col-3 { grid-column: span 3; }
.col-4 { grid-column: span 4; }

/* 全宽板块 - 标题以下所有板块宽度一致 */
.full-width {
  grid-column: 1 / -1;
}

/* 月度趋势图表行 - 确保两个图表并排且同宽同高 */
.chart-row {
  grid-column: 1 / -1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}
.chart-row .chart-panel {
  min-width: 0;
  width: 100%;
  box-sizing: border-box;
}
.chart-container {
  width: 100%;
  height: 200px;
}
@media screen and (max-width: 768px) {
  .chart-row {
    grid-template-columns: 1fr;
  }
}

/* 产品卡片 */
.product-cards {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}
/* 窗口小于600px时，产品卡片单列显示 */
@media screen and (max-width: 600px) {
  .product-cards {
    grid-template-columns: 1fr;
  }
}
.product-card {
  background: #f8fbff;
  border: 1px solid #e3f2fd;
  border-radius: 8px;
  padding: 12px 14px;
}
.product-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.product-name { font-size: 13px; font-weight: 600; color: #1565c0; }
.product-dept { font-size: 11px; }
.product-body { margin-bottom: 8px; }
.product-amount { font-size: 20px; font-weight: 700; color: #1565c0; }
.product-unit { font-size: 11px; font-weight: normal; margin-left: 4px; }
.product-target { font-size: 11px; color: #90a4ae; margin-top: 2px; }
.product-yoy { font-size: 11px; color: #78909c; margin-top: 2px; }
.product-footer {
  display: flex;
  align-items: center;
  gap: 8px;
}
.progress-bar {
  flex: 1;
  height: 6px;
  background: #e3f2fd;
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 1.2s ease;
}
.product-rate { font-size: 12px; font-weight: 600; }

/* ============================================================
   简洁环形进度条
   ============================================================ */

/* 容器布局 */
.ring-progress-container {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
}
@media screen and (max-width: 700px) { 
  .ring-progress-container { grid-template-columns: 1fr; } 
}

/* 卡片设计 */
.ring-card {
  background: #ffffff;
  border: 1px solid #e8eef8;
  border-radius: 12px;
  padding: 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  gap: 12px;
  box-shadow: 0 2px 12px rgba(21, 101, 192, 0.06);
  transition: all 0.25s ease;
  text-align: center;
}

/* 产品名称头部 */
.ring-product-header {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-bottom: 4px;
}

/* 药品类型图标 */
.drug-icon {
  width: 20px;
  height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
}

.drug-icon.injection {
  color: #1565c0;
}

.drug-icon.tablet {
  color: #2e7d32;
}
.ring-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 16px rgba(21, 101, 192, 0.12);
}

/* 环形图表容器 */
.ring-chart-wrapper {
  position: relative;
  width: 110px;
  height: 110px;
  flex-shrink: 0;
}

/* SVG基础 */
.ring-svg {
  width: 100%;
  height: 100%;
}

/* 环形背景轨道 - 灰色 */
.ring-track {
  fill: none;
  stroke: #e0e6ed;
  stroke-width: 10;
}

/* 进度环形 - 蓝色 */
.ring-progress {
  fill: none;
  stroke: #1565c0;
  stroke-width: 10;
  stroke-linecap: round;
  transition: stroke-dashoffset 1.2s cubic-bezier(0.4, 0, 0.2, 1);
}

/* 中心区域 */
.ring-center {
  fill: #ffffff;
}

/* 百分比数字 */
.ring-percent {
  font-size: 22px;
  font-weight: 700;
  fill: #1565c0;
}

/* 达成率标签 */
.ring-label {
  font-size: 10px;
  fill: #90a4ae;
}

/* 产品信息区域 */
.ring-info {
  flex: 1;
  min-width: 0;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.ring-product-name {
  font-size: 14px;
  font-weight: 600;
  color: #2c4a6e;
}

.ring-amount {
  font-size: 20px;
  font-weight: 700;
  color: #1565c0;
  line-height: 1.2;
}

.ring-unit {
  font-size: 11px;
  font-weight: normal;
  color: #90a4ae;
  margin-left: 4px;
}

.ring-target {
  font-size: 11px;
  color: #78909c;
  margin-top: 4px;
}

.ring-detail {
  font-size: 11px;
  color: #f44336;
  margin-top: 4px;
  font-weight: 500;
}

/* 地区排名表格 */
.rank-table {
  width: 100%;
  min-width: 700px;
  border-collapse: collapse;
  font-size: 12px;
}
.rank-table th {
  text-align: center;
  padding: 7px 8px;
  font-size: 11px;
  color: #ffffff;
  background: linear-gradient(135deg, #1565c0, #1976d2);
  border-bottom: none;
  font-weight: 600;
  white-space: nowrap;
}
.rank-table th:first-child { border-radius: 6px 0 0 0; }
.rank-table th:last-child { border-radius: 0 6px 0 0; }
.rank-table td {
  text-align: center;
  padding: 5px 8px;
  border-bottom: 1px solid #e3f2fd;
  color: #2c4a6e;
  white-space: nowrap;
}
.rank-table tr:nth-child(even) td { background: #f3f8ff; }
.rank-table tr:hover td { background: #e3f2fd; }

/* 表头锁定 */
.table-scroll-container {
  max-height: 290px;
  overflow: auto;
  position: relative;
}
.rank-table-sticky thead {
  position: sticky;
  top: 0;
  z-index: 10;
}
.rank-table-sticky th:first-child { border-radius: 6px 0 0 0; }
.rank-table-sticky th:last-child { border-radius: 0 6px 0 0; }

/* 地区列锁定 - 用于地区发货数量排名表格（排名、大区、地区三列锁定） */
/* 第1列：排名 */
.rank-table-sticky-col th:nth-child(1),
.rank-table-sticky-col td:nth-child(1) {
  position: sticky;
  left: 0;
  background: #fff;
  z-index: 6;
  box-shadow: 2px 0 5px rgba(0,0,0,0.1);
}
.rank-table-sticky-col th:nth-child(1) {
  z-index: 16;
  background: linear-gradient(135deg, #1565c0, #1976d2);
  color: #fff;
}
.rank-table-sticky-col tr:nth-child(even) td:nth-child(1) {
  background: #f3f8ff;
}
.rank-table-sticky-col tr:hover td:nth-child(1) {
  background: #e3f2fd;
}

/* 第2列：大区 */
.rank-table-sticky-col th:nth-child(2),
.rank-table-sticky-col td:nth-child(2) {
  position: sticky;
  left: 45px;
  background: #fff;
  z-index: 5;
  box-shadow: 2px 0 5px rgba(0,0,0,0.1);
}
.rank-table-sticky-col th:nth-child(2) {
  z-index: 15;
  background: linear-gradient(135deg, #1565c0, #1976d2);
  color: #fff;
}
.rank-table-sticky-col tr:nth-child(even) td:nth-child(2) {
  background: #f3f8ff;
}
.rank-table-sticky-col tr:hover td:nth-child(2) {
  background: #e3f2fd;
}

/* 第3列：地区 */
.rank-table-sticky-col th:nth-child(3),
.rank-table-sticky-col td:nth-child(3) {
  position: sticky;
  left: 90px;
  background: #fff;
  z-index: 4;
  box-shadow: 2px 0 5px rgba(0,0,0,0.1);
}
.rank-table-sticky-col th:nth-child(3) {
  z-index: 14;
  background: linear-gradient(135deg, #1565c0, #1976d2);
  color: #fff;
}
.rank-table-sticky-col tr:nth-child(even) td:nth-child(3) {
  background: #f3f8ff;
}
.rank-table-sticky-col tr:hover td:nth-child(3) {
  background: #e3f2fd;
}
.rank-badge {
  display: inline-block;
  width: 20px; height: 20px;
  line-height: 20px;
  border-radius: 50%;
  font-size: 11px;
  font-weight: 700;
  color: #fff;
}
.rank-1 { background: #f57c00; }
.rank-2 { background: #fb8c00; }
.rank-3 { background: #ffa726; }
.rate-good { color: #1565c0; font-weight: 600; }
.rate-warn { color: #e65100; font-weight: 600; }
.rate-bad  { color: #c62828; font-weight: 600; }

/* ========== 响应式适配 ========== */
@media screen and (max-width: 768px) {
  .dashboard {
    padding: 12px 12px 20px;
  }
  .header {
    padding: 16px 12px;
  }
  #refresh-btn {
    right: 12px;
  }
  #refresh-btn {
    right: 12px;
  }
  .header h1 {
    font-size: 18px;
    letter-spacing: 1px;
  }
  .subtitle {
    font-size: 11px;
  }
  .update-time {
    font-size: 10px;
  }
  /* 切片器换行 */
  .filter-bar {
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 12px;
    justify-content: flex-start;
    overflow-x: auto;
    padding-bottom: 4px;
  }
  .filter-btn {
    padding: 6px 16px;
    font-size: 13px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  /* 网格布局调整 */
  .grid-main {
    grid-template-columns: 1fr;
  }
  .col-2, .col-3, .col-4 {
    grid-column: span 1;
  }
  /* KPI卡片 */
  .kpi-card {
    padding: 12px 8px;
  }
  .kpi-card .value {
    font-size: 20px;
  }
  .kpi-card .label {
    font-size: 11px;
  }
  .kpi-card .unit {
    font-size: 10px;
  }
  /* 面板 */
  .panel {
    padding: 12px;
  }
  .panel-title {
    font-size: 13px;
    margin-bottom: 10px;
  }
  /* 产品卡片 */
  .product-cards {
    grid-template-columns: 1fr;
  }
  .product-card {
    min-width: auto;
    padding: 12px;
  }
  /* 表格横向滚动 */
  .table-scroll-container {
    max-height: 240px;
    overflow-x: auto;
    overflow-y: auto;
    width: 100%;
  }
  .rank-table {
    min-width: 100%;
    font-size: 11px;
  }
  .rank-table th, .rank-table td {
    padding: 5px 6px;
  }
  /* 产品筛选按钮 */
  .product-filter-bar {
    flex-wrap: wrap;
    gap: 6px;
  }
  .product-filter-btn {
    padding: 4px 12px;
    font-size: 12px;
  }
  /* 手机端：隐藏顶部切片器，显示底部固定切片器 */
  #top-filter-bar {
    display: none;
  }
  .mobile-filter-bar {
    display: flex;
  }
  /* 为底部固定切片器留出空间 */
  .dashboard {
    padding: 12px 12px 70px;
  }
}

/* 超小屏幕 */
@media screen and (max-width: 600px) {
  .header h1 {
    font-size: 16px;
  }
  .header {
    padding: 16px 12px;
  }
  /* KPI卡片2×2排列 */
  .kpi-row {
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }
  .kpi-card {
    padding: 12px 10px;
  }
  .kpi-card .value {
    font-size: 18px;
  }
  .kpi-card .label {
    font-size: 11px;
  }
}

/* 小屏手机 (480px以下) */
@media screen and (max-width: 480px) {
  .dashboard {
    padding: 10px 8px 70px;
  }
  .header {
    padding: 14px 10px;
    border-radius: 8px;
  }
  .header h1 {
    font-size: 15px;
    letter-spacing: 1px;
  }
  .subtitle {
    font-size: 10px;
  }
  .update-time {
    font-size: 9px;
  }
  /* KPI卡片 */
  .kpi-row {
    gap: 8px;
  }
  .kpi-card {
    padding: 10px 8px;
    border-radius: 8px;
  }
  .kpi-card .value {
    font-size: 16px;
  }
  .kpi-card .label {
    font-size: 10px;
  }
  .kpi-card .unit {
    font-size: 9px;
  }
  /* 面板 */
  .panel {
    padding: 10px;
    border-radius: 8px;
  }
  .panel-title {
    font-size: 12px;
    padding-left: 6px;
    margin-bottom: 8px;
  }
  /* 图表 */
  .chart-container {
    height: 180px;
  }
  /* 表格 */
  .rank-table {
    font-size: 10px;
  }
  .rank-table th, .rank-table td {
    padding: 4px 5px;
  }
  /* 环形进度条 */
  .ring-card {
    padding: 12px;
    gap: 8px;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }
  .ring-product-header {
    margin-bottom: 0;
  }
  .ring-info {
    text-align: center;
    align-items: center;
  }
  .ring-chart-wrapper {
    width: 80px;
    height: 80px;
  }
  .ring-product-name {
    font-size: 12px;
  }
  .ring-amount {
    font-size: 16px;
  }
  .ring-target, .ring-detail {
    font-size: 10px;
  }
}

/* 超小屏手机 (360px以下) */
@media screen and (max-width: 360px) {
  .dashboard {
    padding: 8px 6px 70px;
  }
  .header h1 {
    font-size: 14px;
  }
  .subtitle {
    font-size: 9px;
  }
  .kpi-card .value {
    font-size: 14px;
  }
  .kpi-card .label {
    font-size: 9px;
  }
  .chart-container {
    height: 160px;
  }
  .mobile-filter-btn {
    padding: 8px 12px;
    font-size: 12px;
  }
}

/* 手机横屏优化 (768px以下且横向) */
@media screen and (max-width: 768px) and (orientation: landscape) {
  .dashboard {
    padding: 10px 12px 70px;
  }
  .header {
    padding: 12px;
  }
  .header h1 {
    font-size: 16px;
  }
  /* KPI卡片横向排列 */
  .kpi-row {
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  .kpi-card {
    padding: 10px 8px;

  .kpi-card .value {

// ============================================================
// KPI卡片渲染（包含：年度目标、发货金额、达成率、同比、三个月环比）
// ============================================================
function renderKPI(dept) {
  let target, actual, q1_2025;
  let monthly2026;
  
  if (dept === '整体') {
    // 整体：炎琥宁（两部门）+ 萘哌地尔（两部门合计）
    target = DATA.products['炎琥宁80mg-医院销售部'].target_wan 
           + DATA.products['炎琥宁80mg-新营销部'].target_wan 
           + DATA.products['萘哌地尔-医院销售部'].target_wan 
           + DATA.products['萘哌地尔-新营销部'].target_wan;
    actual = DATA.products['炎琥宁80mg-医院销售部'].actual_wan 
           + DATA.products['炎琥宁80mg-新营销部'].actual_wan 
           + DATA.products['萘哌地尔-医院销售部'].actual_wan 
           + DATA.products['萘哌地尔-新营销部'].actual_wan;
    q1_2025 = DATA.overview.total_2025_same_wan;
    monthly2026 = DATA.monthly['2026'];
  } else if (dept === '新营销部') {
    // 新营销部：炎琥宁（任务为0）+ 萘哌地尔（新营销部）
    target = DATA.products['炎琥宁80mg-新营销部'].target_wan + DATA.products['萘哌地尔-新营销部'].target_wan;
    actual = DATA.products['炎琥宁80mg-新营销部'].actual_wan + DATA.products['萘哌地尔-新营销部'].actual_wan;
    q1_2025 = DATA.dept2025Same[dept] || 0;
    monthly2026 = DATA.monthlyDept[dept] ? DATA.monthlyDept[dept]['2026'] : null;
  } else if (dept === '医院销售部') {
    // 医院销售部：炎琥宁（医院销售部）+ 萘哌地尔（医院销售部）
    target = DATA.products['炎琥宁80mg-医院销售部'].target_wan + DATA.products['萘哌地尔-医院销售部'].target_wan;
    actual = DATA.products['炎琥宁80mg-医院销售部'].actual_wan + DATA.products['萘哌地尔-医院销售部'].actual_wan;
    q1_2025 = DATA.dept2025Same[dept] || 0;
    monthly2026 = DATA.monthlyDept[dept] ? DATA.monthlyDept[dept]['2026'] : null;
  } else {
    const deptRegions = DATA.regions.filter(r => r.dept === dept);
    target = deptRegions.reduce((s, r) => s + r.target_wan, 0);
    actual = deptRegions.reduce((s, r) => s + r.actual_wan, 0);
    q1_2025 = DATA.dept2025Same[dept] || 0;
    monthly2026 = DATA.monthlyDept[dept] ? DATA.monthlyDept[dept]['2026'] : null;
  }
  
  // 基础指标计算
  const rate = target > 0 ? (actual / target * 100) : 0;
  const yoy = q1_2025 > 0 ? ((actual - q1_2025) / q1_2025 * 100) : (actual > 0 ? 100 : 0);
  // 目标进度按月计算：当前月份 / 12 * 100%，4月=4/12=33.3%
  const currentMonth = 4;
  const timeProgress = (currentMonth / 12 * 100);

  // 更新DOM
  document.getElementById('kpi-target').textContent = target.toLocaleString('zh-CN', {maximumFractionDigits: 0});
  document.getElementById('kpi-actual').textContent = actual.toLocaleString('zh-CN', {maximumFractionDigits: 1});
  // 达成率颜色：>=时间进度(33.3%)绿色，否则橙色
  const rateColor = rate >= timeProgress ? '#4caf50' : '#ff9800';
  document.getElementById('kpi-rate').innerHTML = `${rate.toFixed(1)}<span style="font-size:16px;color:${rateColor}">%</span>`;
  document.getElementById('kpi-rate').style.color = rateColor;
  document.getElementById('kpi-progress').textContent = `月累计目标进度 ${timeProgress.toFixed(1)}%`;

  const yoyColor = yoy >= 0 ? '#4caf50' : '#f44336';
  const yoySign = yoy >= 0 ? '+' : '';
  document.getElementById('kpi-yoy').style.color = yoyColor;
  document.getElementById('kpi-yoy').innerHTML = `${yoySign}${yoy.toFixed(1)}<span style="font-size:16px">%</span>`;
  document.getElementById('kpi-yoy-unit').textContent = '';
}

      { name: '萘哌地尔', target: DATA.products['萘哌地尔-医院销售部'].target_wan, actual: DATA.products['萘哌地尔-医院销售部'].actual_wan }
    ];
  } else {
    cards = [
      { name: '炎琥宁80mg', target: DATA.products['炎琥宁80mg-新营销部'].target_wan, actual: DATA.products['炎琥宁80mg-新营销部'].actual_wan },

    ];
  }

  const cx = 55, cy = 55, radius = 44;
  const circumference = 2 * Math.PI * radius;

  container.innerHTML = cards.map(p => {
    const rate = p.target > 0 ? (p.actual / p.target * 100) : 0;
    const rateFixed = rate.toFixed(1);
    const displayRate = Math.min(rate, 100);
    const remaining = p.target - p.actual;

    // 计算进度弧长
    const progressLength = (displayRate / 100) * circumference;
    const dashArray = `${progressLength} ${circumference}`;

    // 根据产品名称确定图标
    const isInjection = p.name.includes('炎琥宁');
    const iconClass = isInjection ? 'injection' : 'tablet';
    const iconSvg = isInjection 
      ? '<svg viewBox="0 0 24 24" fill="currentColor" style="width:100%;height:100%;"><path d="M12 2C12.55 2 13 2.45 13 3V5H15C15.55 5 16 5.45 16 6C16 6.55 15.55 7 15 7H13V9H15C16.1 9 17 9.9 17 11V19C17 20.1 16.1 21 15 21H9C7.9 21 7 20.1 7 19V11C7 9.9 7.9 9 9 9H11V7H9C8.45 7 8 6.55 8 6C8 5.45 8.45 5 9 5H11V3C11 2.45 11.45 2 12 2M9 11V19H15V11H9Z"/></svg>'
      : '<svg viewBox="0 0 24 24" fill="currentColor" style="width:100%;height:100%;"><path d="M6 4H18C19.1 4 20 4.9 20 6V18C20 19.1 19.1 20 18 20H6C4.9 20 4 19.1 4 18V6C4 4.9 4.9 4 6 4M6 6V18H18V6H6M8 8H16V16H8V8Z"/></svg>';

    return `<div class="ring-card">

      <div class="ring-product-header">
        <div class="drug-icon ${iconClass}">${iconSvg}</div>
        <div class="ring-product-name">${p.name}</div>
      </div>
      <!-- 环形进度图 -->
      <div class="ring-chart-wrapper">
        <svg class="ring-svg" viewBox="0 0 110 110">
          <!-- 灰色背景轨道 -->
          <circle class="ring-track" cx="${cx}" cy="${cy}" r="${radius}"/>
          <!-- 蓝色进度环 -->
          <circle class="ring-progress" cx="${cx}" cy="${cy}" r="${radius}" stroke-dasharray="${dashArray}" transform="rotate(-90 ${cx} ${cy})"/>
          <!-- 中心白色圆形 -->
          <circle class="ring-center" cx="${cx}" cy="${cy}" r="32"/>
          <!-- 百分比文字 -->
          <text class="ring-percent" x="${cx}" y="${cy - 2}" text-anchor="middle">${rateFixed}%</text>
          <text class="ring-label" x="${cx}" y="${cy + 12}" text-anchor="middle">达成率</text>
        </svg>
      </div>
      <!-- 产品信息 -->
      <div class="ring-info">
        <div class="ring-amount">${p.actual.toFixed(1)}<span class="ring-unit">万元</span></div>
        <div class="ring-target">年目标 ${p.target.toLocaleString()}万元</div>
        <div class="ring-detail">差距 ${remaining.toFixed(1)}万元</div>
      </div>
    </div>`;
  }).join('');
}

function renderRegionTable(filter) {
  let regions = filter === '整体'
    ? [...DATA.regions]
    : DATA.regions.filter(r => r.dept === filter);
  // 按发货金额（万元）从大到小排序
  regions.sort((a, b) => b.actual_wan - a.actual_wan);
  const tbody = document.getElementById('region-tbody');
  // 时间进度：100% / 12 * 4月 = 33.3%
  const timeProgress = 100 / 12 * 4;
  tbody.innerHTML = regions.map((r, i) => {
    const rate = r.target_wan > 0 ? (r.actual_wan / r.target_wan * 100) : 0;
    const badge = i < 3 ? `<span class="rank-badge rank-${i+1}">${i+1}</span>` : (i + 1);
    // 达成率 >= 时间进度(33.3%) 显示绿色，否则橙色
    const rateColor = rate >= timeProgress ? '#4caf50' : '#ff9800';
    // 目标金额差距 = 发货 - 目标
    const gap = r.actual_wan - r.target_wan;
    const gapColor = gap >= 0 ? '#4caf50' : '#f44336';
    const gapSign = gap >= 0 ? '+' : '';
    return `<tr>
      <td>${badge}</td>
      <td>${r.area}</td>
      <td>${r.region}</td>
      <td>${r.target_wan.toLocaleString()}</td>
      <td>${r.actual_wan.toFixed(1)}</td>
      <td>
        <div style="display:flex;align-items:center;gap:8px;">
          <div style="flex:1;min-width:50px;height:6px;background:#e3f2fd;border-radius:3px;overflow:hidden;">
            <div style="width:${Math.min(rate, 100)}%;height:100%;background:${rateColor};border-radius:3px;"></div>
          </div>
          <span style="font-size:11px;color:${rateColor};font-weight:600;white-space:nowrap;">${rate.toFixed(1)}%</span>
        </div>
      </td>
      <td style="color:${gapColor};font-weight:600;">${gapSign}${gap.toFixed(1)}</td>
    </tr>`;
  }).join('');
}

          symbol: 'rect',
          symbolSize: [1, 1],
          itemStyle: { color: avgLineColor },
          label: { show: true, position: 'right', color: avgLineColor, fontSize: 10, fontWeight: 600, formatter: () => avgTarget.toFixed(1) + unit, distance: 5 },
          data: [{ coord: [11, avgTarget], value: avgTarget, itemStyle: { color: avgLineColor } }]
        }
      }
    ]
  });
}

      // 强制重新计算布局

        initMonthlyChart();

// 创建隐藏的文件选择input
const fileInput = document.createElement('input');
fileInput.type = 'file';
fileInput.accept = '.xlsx,.xls';
fileInput.style.display = 'none';
fileInput.addEventListener('change', handleFileSelect);
document.body.appendChild(fileInput);

// 绑定刷新按钮点击事件
const refreshBtn = document.getElementById('refresh-btn');
if (refreshBtn) {
  refreshBtn.onclick = () => fileInput.click();
}

// 处理文件选择
function handleFileSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, { type: 'array' });
      
      // 解析Excel数据
      const parsedData = parseExcelData(workbook);
      
      // 更新DATA对象
      updateDataFromExcel(parsedData);
      
      // 重新渲染看板
      renderDashboard();
      
      // 显示成功提示
      showToast('数据更新成功！', 'success');
      
      // 更新统计日期
      const now = new Date();
      const dateStr = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;
      document.querySelector('.subtitle').innerHTML = `产品：炎琥宁80mg · 萘哌地尔 | 统计截至：${dateStr}`;
      
    } catch (err) {
      console.error('解析Excel失败:', err);
      showToast('数据解析失败，请检查文件格式', 'error');
    }
  };
  reader.readAsArrayBuffer(file);
}

// 解析Excel数据
function parseExcelData(workbook) {
  const result = {
    overview: {},
    monthly: { '2026': {}, '2025': {} },
    monthlyDept: { '医院销售部': { '2026': {}, '2025': {} }, '新营销部': { '2026': {}, '2025': {} } },
    products: {},
    monthlyProduct: {},
    monthlyQty: {},
    regions: [],
    regionQty: { '炎琥宁80mg': [], '萘哌地尔': [] }
  };
  
  // 获取所有工作表名称
  const sheetNames = workbook.SheetNames;
  
  sheetNames.forEach(sheetName => {
    const worksheet = workbook.Sheets[sheetName];
    const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
    
    // 根据工作表名称解析不同数据
    if (sheetName.includes('发货') || sheetName.includes('数据明细')) {
      parseShipmentData(jsonData, result);
    } else if (sheetName.includes('任务') || sheetName.includes('目标')) {
      parseTargetData(jsonData, result);
    }
  });
  
  return result;
}

// 解析发货数据
function parseShipmentData(data, result) {
  if (!data || data.length < 2) return;
  
  // 假设第一行是表头
  const headers = data[0];
  const rows = data.slice(1);
  
  // 查找关键列索引
  const dateIdx = headers.findIndex(h => h && (h.includes('日期') || h.includes('时间')));
  const deptIdx = headers.findIndex(h => h && h.includes('部门'));
  const productIdx = headers.findIndex(h => h && h.includes('产品'));
  const amountIdx = headers.findIndex(h => h && (h.includes('金额') || h.includes('无税金额')));
  const qtyIdx = headers.findIndex(h => h && (h.includes('数量') || h.includes('统计物料')));
  const regionIdx = headers.findIndex(h => h && (h.includes('地区') || h.includes('省份')));
  
  // 汇总数据
  let totalAmount2026 = 0;
  let totalAmount2025 = 0;
  
  rows.forEach(row => {
    const dateStr = row[dateIdx];
    const dept = row[deptIdx] || '医院销售部';
    const product = row[productIdx] || '';
    const amount = parseFloat(row[amountIdx]) || 0;
    const qty = parseFloat(row[qtyIdx]) || 0;
    const region = row[regionIdx] || '';
    
    if (!dateStr) return;
    
    const date = new Date(dateStr);
    const year = date.getFullYear();
    const month = date.getMonth() + 1;
    
    if (year === 2026) {
      totalAmount2026 += amount;
      
      // 按月汇总
      if (!result.monthly['2026'][month]) result.monthly['2026'][month] = 0;
      result.monthly['2026'][month] += amount;
      
      // 按部门按月汇总
      if (!result.monthlyDept[dept]) result.monthlyDept[dept] = { '2026': {}, '2025': {} };
      if (!result.monthlyDept[dept]['2026'][month]) result.monthlyDept[dept]['2026'][month] = 0;
      result.monthlyDept[dept]['2026'][month] += amount;
      
      // 按产品汇总
      const productKey = product + '-' + dept;
      if (!result.monthlyProduct[productKey]) result.monthlyProduct[productKey] = { '2026': {}, '2025': {} };
      if (!result.monthlyProduct[productKey]['2026'][month]) result.monthlyProduct[productKey]['2026'][month] = 0;
      result.monthlyProduct[productKey]['2026'][month] += amount;
      
      // 数量汇总
      if (!result.monthlyQty[productKey]) result.monthlyQty[productKey] = { '2026': {}, '2025': {} };
      if (!result.monthlyQty[productKey]['2026'][month]) result.monthlyQty[productKey]['2026'][month] = 0;
      result.monthlyQty[productKey]['2026'][month] += qty;
      
    } else if (year === 2025) {
      totalAmount2025 += amount;
      
      if (!result.monthly['2025'][month]) result.monthly['2025'][month] = 0;
      result.monthly['2025'][month] += amount;
      
      if (!result.monthlyDept[dept]) result.monthlyDept[dept] = { '2026': {}, '2025': {} };
      if (!result.monthlyDept[dept]['2025'][month]) result.monthlyDept[dept]['2025'][month] = 0;
      result.monthlyDept[dept]['2025'][month] += amount;
    }
  });
  
  result.overview.total_actual_wan = totalAmount2026 / 10000;
  result.overview.total_2025_same_wan = totalAmount2025 / 10000;
}

// 解析任务/目标数据
function parseTargetData(data, result) {
  if (!data || data.length < 2) return;
  
  const headers = data[0];
  const rows = data.slice(1);
  
  const productIdx = headers.findIndex(h => h && h.includes('产品'));
  const deptIdx = headers.findIndex(h => h && h.includes('部门'));
  const targetIdx = headers.findIndex(h => h && (h.includes('目标') || h.includes('任务')));
  
  let totalTarget = 0;
  
  rows.forEach(row => {
    const product = row[productIdx] || '';
    const dept = row[deptIdx] || '医院销售部';
    const target = parseFloat(row[targetIdx]) || 0;
    
    const productKey = product + '-' + dept;
    if (!result.products[productKey]) {
      result.products[productKey] = { target_wan: 0, actual_wan: 0, rate: 0, yoy: 0, dept: dept, parent: product };
    }
    result.products[productKey].target_wan = target;
    totalTarget += target;
  });
  
  result.overview.total_target_wan = totalTarget;
}

// 更新DATA对象
function updateDataFromExcel(parsedData) {
  // 合并概览数据
  if (parsedData.overview.total_actual_wan) {
    DATA.overview.total_actual_wan = parsedData.overview.total_actual_wan;
  }
  if (parsedData.overview.total_target_wan) {
    DATA.overview.total_target_wan = parsedData.overview.total_target_wan;
  }
  
  // 重新计算完成率
  if (DATA.overview.total_target_wan > 0) {
    DATA.overview.completion_rate = (DATA.overview.total_actual_wan / DATA.overview.total_target_wan * 100).toFixed(1);
  }
  
  // 合并月度数据
  Object.assign(DATA.monthly['2026'], parsedData.monthly['2026']);
  Object.assign(DATA.monthly['2025'], parsedData.monthly['2025']);
  
  // 合并部门数据
  Object.keys(parsedData.monthlyDept).forEach(dept => {
    if (!DATA.monthlyDept[dept]) DATA.monthlyDept[dept] = { '2026': {}, '2025': {} };
    Object.assign(DATA.monthlyDept[dept]['2026'], parsedData.monthlyDept[dept]['2026']);
    Object.assign(DATA.monthlyDept[dept]['2025'], parsedData.monthlyDept[dept]['2025']);
  });
  
  // 合并产品数据
  Object.keys(parsedData.products).forEach(key => {
    if (!DATA.products[key]) {
      DATA.products[key] = parsedData.products[key];
    } else {
      DATA.products[key].target_wan = parsedData.products[key].target_wan || DATA.products[key].target_wan;
    }
  });
  
  // 合并月度产品数据
  Object.keys(parsedData.monthlyProduct).forEach(key => {
    if (!DATA.monthlyProduct[key]) DATA.monthlyProduct[key] = { '2026': {}, '2025': {} };
    Object.assign(DATA.monthlyProduct[key]['2026'], parsedData.monthlyProduct[key]['2026']);
  });
  
  // 合并数量数据
  Object.keys(parsedData.monthlyQty).forEach(key => {
    if (!DATA.monthlyQty[key]) DATA.monthlyQty[key] = { '2026': {}, '2025': {} };
    Object.assign(DATA.monthlyQty[key]['2026'], parsedData.monthlyQty[key]['2026']);
  });
}

// 显示提示消息
function showToast(message, type = 'info') {
  const toast = document.createElement('div');
  toast.className = `toast toast-${type}`;
  toast.textContent = message;
  toast.style.cssText = `
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    z-index: 10000;
    animation: fadeInOut 3s ease;
    ${type === 'success' ? 'background: #4caf50; color: white;' : 
      type === 'error' ? 'background: #f44336; color: white;' : 
      'background: #2196f3; color: white;'}
  `;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

// 添加动画样式
const style = document.createElement('style');
style.textContent = `
  @keyframes fadeInOut {
    0% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
    10% { opacity: 1; transform: translateX(-50%) translateY(0); }
    90% { opacity: 1; transform: translateX(-50%) translateY(0); }
    100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
  }
`;
document.head.appendChild(style);
