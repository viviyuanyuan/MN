.slicer-btn{padding:10px 28px;border:2px solid #e2e8f0;background:#fff;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;color:#475569;transition:all 0.2s}
.slicer-btn:hover{border-color:#3b82f6;color:#3b82f6}
.slicer-btn.active{background:#3b82f6;color:#fff;border-color:#3b82f6;box-shadow:0 4px 12px rgba(59,130,246,0.3)}
.sub-slicer{background:#f8fafc;padding:10px 16px;border-radius:8px;margin-bottom:12px;border:1px solid #e2e8f0}
.sub-slicer .slicer-btn{padding:7px 18px;font-size:13px}
.page-content{display:none;background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.page-content.active{display:block}
.tab-nav{display:flex;border-bottom:2px solid #e2e8f0;margin-bottom:16px;background:#f8fafc;border-radius:8px 8px 0 0;padding:4px}
.tab-btn{flex:1;padding:10px 16px;border:none;background:transparent;cursor:pointer;font-size:14px;font-weight:500;color:#64748b;transition:all 0.2s;border-radius:6px}
.tab-btn:hover{color:#3b82f6;background:#f1f5f9}
.tab-btn.active{color:#fff;background:#3b82f6;box-shadow:0 2px 8px rgba(59,130,246,0.3)}
.tab-content{display:none;padding:12px 0}
.tab-content.active{display:block}
.kpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:20px}
.kpi-card{background:#fff;padding:18px 16px;border-radius:10px;border:1px solid #e2e8f0;text-align:center;transition:all 0.3s}
.kpi-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.08)}
.kpi-label{font-size:12px;color:#64748b;margin-bottom:8px;font-weight:400}
.kpi-value{font-size:22px;font-weight:600;color:#1e293b;margin-bottom:4px}
.kpi-unit{font-size:13px;color:#64748b;margin-left:3px;font-weight:400}
.kpi-change{font-size:13px;font-weight:500;display:inline-flex;align-items:center;gap:4px}

.kpi-change.down{color:#dc2626}
.kpi-change.neutral{color:#64748b}

.chart-container{background:#fff;border-radius:12px;padding:16px;margin-bottom:16px;border:1px solid #e2e8f0}
.chart-title{font-size:15px;font-weight:600;color:#1e293b;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid #f1f5f9}
.chart-box{height:320px}
.table-container{background:#fff;border-radius:12px;overflow:hidden;border:1px solid #e2e8f0;margin-top:12px}
.table-header{display:grid;grid-template-columns:50px 1fr 100px 100px 90px 80px;background:#0078d4;color:#fff;padding:12px 14px;font-size:12px;font-weight:600;text-align:center}
.table-row{display:grid;grid-template-columns:50px 1fr 100px 100px 90px 80px;padding:10px 14px;border-bottom:1px solid #f1f5f9;align-items:center;text-align:center;transition:background 0.2s}
.table-row:hover{background:#f8fafc}
.table-row:nth-child(even){background:#fafbfc}
.rank{font-weight:700;color:#64748b;font-size:12px}
.rank.top1{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;background:#ffc107;color:#fff;border-radius:50%;font-size:14px;font-weight:700}

.pct-text{font-size:10px;color:#1e40af;font-weight:600;white-space:nowrap}

.yoy.down{color:#dc2626}

function getMV(year,month,product,dept){
  const key=`${year}-${month}-${product}-${dept}`;
  return monthlyRaw[key]||{};
}

function calcYoY(product,dept,metric){
  // 同比逻辑：1月1日至当前日期，2026 vs 2025（实际到天）
  const{currentMonth,currentDay}=DATA_CONFIG;
  let current=0,lastYear=0;
  for(let m=1;m<=currentMonth;m++){current+=getMV(2026,m,product,dept)[metric]||0;}
  for(let m=1;m<=currentMonth;m++){lastYear+=getMV(2025,m,product,dept)[metric]||0;}
  if(lastYear===0)return null;
  return(current-lastYear)/lastYear;
}

function calcMoM(product,dept,metric){
  const{currentMonth}=DATA_CONFIG;
  if(currentMonth<4)return null;
  const recent3=currentMonth-2;
  const prev3=currentMonth-5;
  let recentSum=0,prevSum=0;
  for(let m=recent3;m<=currentMonth;m++){recentSum+=getMV(2026,m,product,dept)[metric]||0;}
  for(let m=prev3;m<=currentMonth-3;m++){if(m>0)prevSum+=getMV(2026,m,product,dept)[metric]||0;}
  if(prevSum===0)return null;
  return(recentSum-prevSum)/prevSum;
}

function formatNum(val,metric){
  if(val==null)return'-';
  return val.toFixed(2);
}

function formatPct(val){
  if(val==null)return'-';
  const arrow=val>0?'↑':val<0?'↓':'→';
  return`${arrow} ${(val*100).toFixed(1)}%`;
}

function renderTable(containerId,product,dept,metric){
  const container=document.getElementById(containerId);
  const targetData=target2026[product][dept];
  const actualDataCurrent=actual26[product][dept];
  const actualDataLastYear=actual25[product][dept];
  const rows=[];
  for(const[region,data]of Object.entries(targetData)){
    if((data[metric]||0)>0){
      rows.push({region:region,person:data.person,target:data[metric],actual:actualDataCurrent[region]?actualDataCurrent[region][metric]:0,lastYear:actualDataLastYear[region]?actualDataLastYear[region][metric]:0});
    }
  }
  rows.sort((a,b)=>{
    const pA=a.actual/a.target||0;
    const pB=b.actual/b.target||0;
    return pB-pA||b.actual-a.actual;
  });
  container.innerHTML=rows.map((row,idx)=>{
    const progress=row.target>0?row.actual/row.target:0;
    const yoy=row.lastYear>0?(row.actual-row.lastYear)/row.lastYear:null;
    const rankClass=idx===0?'top1':idx===1?'top2':idx===2?'top3':'';
    const yoyClass=yoy===null?'neutral':yoy>0?'up':'down';
    const barW=Math.min(progress*100,100).toFixed(1);
    const metricUnit=metric==='jine'?'万元':'万盒';
    return`<div class="table-row">
<div class="rank"><span class="rank ${rankClass}">${idx+1}</span></div>
<div class="region">${row.region}<div class="person">${row.person}</div></div>
<div class="target">${row.target.toFixed(2)}</div>
<div class="actual">${row.actual.toFixed(2)}</div>
<div><div class="pct-bar"><div class="pct-bar-inner" style="width:${barW}%;max-width:60px"></div><span class="pct-text">${(progress*100).toFixed(1)}%</span></div></div>
<div class="yoy ${yoyClass}">${yoy===null?'-':(yoy>0?'↑':'↓')+' '+(Math.abs(yoy)*100).toFixed(1)+'%'}</div>
</div>`;
  }).join('');
}
