<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="dashboard-embed-scale" content="auto">
<title>抗过敏组凯莱止产品发货看板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<style>

/* ===== RESET & BASE ===== */
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Microsoft YaHei','PingFang SC','Helvetica Neue',sans-serif;
     background:#EEF1F7;color:#2C3E50;min-width:320px;font-size:22px;}

/* ===== HEADER ===== */
.header{
  background:rgb(1,112,193);
  color:#fff;padding:0 40px;
  display:flex;align-items:center;justify-content:space-between;
  height:90px;position:relative;overflow:hidden;
  box-shadow:0 4px 16px rgba(1,112,193,.35);
}
.header::before{
  content:'';position:absolute;right:-60px;top:-40px;
  width:260px;height:160px;border-radius:50%;
  background:rgba(245,131,31,.10);
}
.header::after{
  content:'';position:absolute;right:80px;top:10px;
  width:120px;height:120px;border-radius:50%;
  background:rgba(255,255,255,.04);
}
.header-left{display:flex;align-items:center;gap:16px;z-index:1;}
.logo-wrap{
  width:62px;height:62px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.logo-wrap img{width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 2px 6px rgba(255,255,255,.3));}
.header-titles{}
.header-main-title{font-size:38px;font-weight:700;letter-spacing:3px;
  text-shadow:0 2px 8px rgba(0,0,0,.25);}
.header-subtitle{font-size:16px;color:rgba(255,255,255,.65);margin-top:3px;letter-spacing:1px;}
.header-right{text-align:right;z-index:1;background:rgb(1,112,193);}
.header-meta{font-size:16px;color:rgba(255,255,255,.75);line-height:2;background:rgb(1,112,193);}
.header-meta strong{color:#FFB347;font-weight:600;}
.header-meta .meta-dot{display:inline-block;width:6px;height:6px;border-radius:50%;
  background:#F5831F;margin-right:6px;vertical-align:middle;}

/* ===== NAV ===== */
.nav{
  background:#fff;display:flex;gap:0;
  border-bottom:3px solid #E8ECF4;
  box-shadow:0 2px 8px rgba(0,0,0,.06);
  padding-left:30px;
}
.nav-btn{
  padding:14px 38px;font-size:20px;font-weight:600;border:none;cursor:pointer;
  background:transparent;color:#7A8BA8;transition:all .25s;
  border-bottom:3px solid transparent;margin-bottom:-3px;
  display:flex;align-items:center;gap:8px;
}
.nav-btn:hover{color:#0068C8;background:rgba(0,104,200,.04);}
.nav-btn.active{color:#0068C8;border-bottom:3px solid #F5831F;background:#fff;}
.nav-btn .nav-icon{font-size:22px;}

/* ===== MAIN ===== */
.main{padding:20px 30px 30px;}
.page{display:none;}
.page.active{display:block;}

/* ===== SECTION TITLE ===== */
.section-title{
  display:flex;align-items:center;gap:10px;
  font-size:24px;font-weight:700;color:#0068C8;
  margin:22px 0 14px;
}
.section-title::before{
  content:'';display:block;width:4px;height:20px;border-radius:2px;
  background:linear-gradient(180deg,#F5831F,#E06C10);flex-shrink:0;
}

/* ===== KPI CARDS ===== */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:4px;}
.kpi-row-5{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:4px;}

.kpi-card{
  background:#fff;border-radius:14px;padding:18px 20px 16px;
  box-shadow:0 2px 12px rgba(0,0,0,.06);
  position:relative;overflow:hidden;border:1px solid #EEF1F7;
  transition:transform .2s,box-shadow .2s;
}
.kpi-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.10);}
.kpi-card .card-icon{
  position:absolute;right:16px;top:16px;
  width:42px;height:42px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;font-size:20px;
  opacity:.9;
}
.kpi-card.type-blue .card-icon{background:rgba(0,104,200,.10);}

.kpi-card.type-orange .card-icon{background:rgba(245,131,31,.12);}
.kpi-card.type-green .card-icon{background:rgba(39,174,96,.12);}
.kpi-card.type-red .card-icon{background:rgba(231,76,60,.12);}
.kpi-card.type-purple .card-icon{background:rgba(142,68,173,.12);}
.kpi-card.type-teal .card-icon{background:rgba(26,188,156,.12);}

.kpi-card::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:3px;border-radius:0 0 14px 14px;
}
.kpi-card.type-blue::after{background:linear-gradient(90deg,#0068C8,#0A85E3);}
.kpi-card.type-orange::after{background:linear-gradient(90deg,#F5831F,#FFB347);}
.kpi-card.type-green::after{background:linear-gradient(90deg,#27AE60,#58D68D);}
.kpi-card.type-red::after{background:linear-gradient(90deg,#E74C3C,#FF6B6B);}
.kpi-card.type-purple::after{background:linear-gradient(90deg,#8E44AD,#BB8FCE);}
.kpi-card.type-teal::after{background:linear-gradient(90deg,#1ABC9C,#76D7C4);}

.kpi-label{font-size:18px;color:#8C9AB0;font-weight:500;margin-bottom:8px;}
.kpi-value{font-size:40px;font-weight:700;color:#0068C8;line-height:1;margin-bottom:8px;}
.kpi-value .unit{font-size:16px;font-weight:400;color:#8C9AB0;margin-left:3px;}
.kpi-sub{font-size:16px;color:#8C9AB0;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.kpi-sub .yoy-up{color:#E74C3C;font-weight:600;}
.kpi-sub .yoy-down{color:#27AE60;font-weight:600;}
.kpi-sub .yoy-na{color:#AAB2BF;}

.progress-bar-wrap{margin-top:10px;}
.progress-bar-bg{background:#EEF1F7;border-radius:4px;height:6px;overflow:hidden;}
.progress-bar-fill{height:6px;border-radius:4px;transition:width .6s ease;}
.progress-bar-label{font-size:15px;color:#8C9AB0;margin-top:4px;display:flex;justify-content:space-between;}

.badge{
  padding:2px 8px;border-radius:20px;font-size:15px;font-weight:600;
  display:inline-block;letter-spacing:.5px;
}
.badge-blue{background:#E0EFFC;color:#0068C8;}
.badge-orange{background:#FFF3E8;color:#C96B10;}
.badge-green{background:#E8F8F0;color:#1E8449;}
.badge-red{background:#FDECEA;color:#C0392B;}
.badge-gray{background:#F0F3F7;color:#5D6D7E;}

/* ===== CHARTS ===== */
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.chart-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px;}

.chart-box{
  background:#fff;border-radius:14px;padding:20px 22px;
  box-shadow:0 2px 12px rgba(0,0,0,.06);border:1px solid #EEF1F7;
}
.chart-box h3{
  font-size:20px;color:#0068C8;font-weight:600;
  margin-bottom:14px;padding-bottom:12px;
  border-bottom:1px solid #F0F3F7;
  display:flex;align-items:center;gap:8px;
}
.chart-box h3::before{
  content:'';display:block;width:3px;height:14px;border-radius:2px;
  background:linear-gradient(180deg,#F5831F,#0068C8);flex-shrink:0;
}
.chart-box canvas{max-height:340px;}

/* ===== TABLE ===== */
.table-box{
  background:#fff;border-radius:14px;padding:20px 22px;
  box-shadow:0 2px 12px rgba(0,0,0,.06);border:1px solid #EEF1F7;
  margin-top:16px;
}
.table-box h3{
  font-size:24px;color:#0068C8;font-weight:600;
  margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid #F0F3F7;
  display:flex;align-items:center;gap:8px;
}
.table-box h3::before{
  content:'';display:block;width:3px;height:14px;border-radius:2px;
  background:linear-gradient(180deg,#F5831F,#0068C8);
}
table{width:100%;border-collapse:collapse;font-size:19px;}
thead tr{background:#F7F9FC;}
th{
  color:#4A5568;font-weight:600;padding:14px 13px;
  text-align:center;border-bottom:2px solid #E8ECF4;
  font-size:19px;letter-spacing:.4px;
}
td{padding:14px 13px;text-align:center;border-bottom:1px solid #F0F3F7;color:#2C3E50;font-size:19px;}
tbody tr:nth-child(even) td{background:#FAFBFD;}
tbody tr:hover td{background:#F0F5FF;}
.text-left{text-align:left!important;}
.text-right{text-align:right!important;}

/* 表格内进度条 */
.tbl-progress{width:100%;min-width:90px;}
.tbl-progress-bar{background:#EEF1F7;border-radius:10px;height:28px;overflow:hidden;position:relative;}
.tbl-progress-fill{height:100%;border-radius:10px;transition:width .6s ease;min-width:2px;display:flex;align-items:center;justify-content:center;}
.tbl-progress-text{font-size:14px;color:#fff;font-weight:700;text-shadow:0 1px 3px rgba(0,0,0,.35);white-space:nowrap;padding:0 8px;}
.tbl-progress-pct{font-size:14px;font-weight:600;margin-top:4px;text-align:center;}

/* ===== AREA TAG COLORS ===== */
.area-tag{
  display:inline-block;padding:2px 10px;border-radius:4px;
  font-size:15px;font-weight:600;
}
.area-huadong{background:#E0EFFC;color:#0068C8;}
.area-huabei{background:#FFF3E8;color:#C96B10;}
.area-huanan{background:#E8F8F0;color:#1E8449;}
.area-huaxi{background:#F5EEF8;color:#7D3C98;}
.area-xinyx{background:#FEF9E7;color:#B7950B;}
.area-default{background:#F0F3F7;color:#5D6D7E;}

/* ===== TABLE COLUMN WIDTHS (desktop) ===== */
.tw-dept{min-width:80px;}
.tw-empty{min-width:10px;}
.tw-num{min-width:100px;}
.tw-badge{min-width:80px;}
.tw-gap{min-width:100px;}
.tw-prog{min-width:140px;}
.tw-rank{min-width:50px;}
.tw-region{min-width:90px;}
.tw-owner{min-width:80px;}
.tw-channel{min-width:60px;}

/* ===== FOOTER ===== */
.footer{
  text-align:center;padding:14px 30px;
  color:#AAB2BF;font-size:15px;
  border-top:1px solid #E8ECF4;
  background:#fff;margin-top:10px;
}
.footer span{color:#F5831F;font-weight:500;}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:#F0F3F7;}
::-webkit-scrollbar-thumb{background:#BDC8D9;border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:#8C9AB0;}

/* ===== RESPONSIVE ===== */
@media(max-width:1200px){
  .kpi-row{grid-template-columns:repeat(2,1fr)!important;}
  .kpi-row-5{grid-template-columns:repeat(2,1fr)!important;}
  .chart-row,.chart-row-3{grid-template-columns:1fr!important;}
  .chart-row-3 .chart-box:last-child{grid-column:auto;}
}

@media(max-width:768px){
  body{font-size:13px;}
  .header{flex-direction:row;height:auto;padding:10px 14px;gap:8px;align-items:center;}
  .header-left{flex-shrink:0;}
  .header-main-title{font-size:18px;letter-spacing:1px;}
  .header-subtitle{font-size:10px;}
  .logo-wrap{width:40px;height:40px;border-radius:10px;}
  .logo-wrap svg{width:24px;height:24px;}
  .header-right{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;white-space:nowrap;}
  .header-meta{line-height:1.6;font-size:11px;text-align:right;}
  .nav{padding-left:0;overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .nav-btn{padding:10px 18px;font-size:13px;white-space:nowrap;}
  .main{padding:12px 10px 20px;}
  .kpi-row,.kpi-row-5{grid-template-columns:repeat(4,1fr)!important;gap:6px!important;}
  .kpi-card{padding:10px 8px 8px;border-radius:10px;}
  .kpi-label{font-size:10px;margin-bottom:3px;line-height:1.2;white-space:nowrap;}
  .kpi-value{font-size:18px;margin-bottom:3px;line-height:1;}
  .kpi-value .unit{font-size:9px;}
  .kpi-sub{font-size:9px;gap:2px;line-height:1.2;}
  .kpi-card .card-icon{width:22px;height:22px;font-size:11px;right:4px;top:4px;border-radius:5px;}
  .progress-bar-wrap{margin-top:4px;}
  .progress-bar-bg{height:4px;}
  .progress-bar-label{font-size:8px;margin-top:2px;}
  .badge{font-size:8px;padding:1px 4px;border-radius:8px;}
  .chart-row,.chart-row-3{grid-template-columns:1fr!important;gap:10px!important;}
  .chart-box{padding:14px 12px;border-radius:10px;}
  .chart-box h3{font-size:13px;margin-bottom:10px;padding-bottom:8px;}
  .chart-box h3::before{height:10px;width:2px;}
  .chart-box canvas{max-height:260px;}
  .section-title{font-size:14px;margin:16px 0 10px;}
  .table-box{padding:14px 10px;border-radius:10px;margin-top:12px;}
  .table-box h3{font-size:13px;}
  table{font-size:12px;}
  th,td{padding:7px 6px;font-size:11px;white-space:nowrap;}
  .badge{font-size:10px;padding:1px 6px;}
  .area-tag{font-size:10px;padding:1px 6px;}
  .tbl-progress-bar{height:20px;}
  .tbl-progress-text{font-size:10px;}
  .footer{font-size:10px;padding:10px 20px;}
}

@media(max-width:480px){
  .header-main-title{font-size:15px;}
  .header-subtitle{display:none;}
  .nav-btn{padding:8px 14px;font-size:12px;}
  .nav-btn .nav-icon{display:none;}
  .kpi-value{font-size:20px;}
  .kpi-label{font-size:11px;}
  .chart-box canvas{max-height:220px;}
}

/* ===== MOBILE TABLE WRAPPER ===== */
.table-scroll-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -2px;}

/* ===== MOBILE META (under title) ===== */
.mobile-meta{display:none;background:rgb(1,112,193);}
.desktop-meta{}

@media(max-width:768px){
  body{font-size:13px;}
  /* HEADER: 同桌面端布局，右侧两行信息 */
  .header{height:auto;padding:10px 12px;gap:10px;align-items:center;}
  .header-left{flex:1 1 auto;min-width:0;}
  .header-main-title{font-size:15px;letter-spacing:0.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;}
  .header-subtitle{display:none;}
  .logo-wrap{width:32px;height:32px;border-radius:8px;}
  .logo-wrap svg{width:20px;height:20px;}
  /* mobile meta 在右侧，两行显示 */
  .mobile-meta{display:flex!important;flex-direction:column;align-items:flex-end;gap:3px;font-size:10px;color:rgba(255,255,255,.7);line-height:1.3;white-space:nowrap;}
  .mobile-meta .meta-dot{width:4px;height:4px;margin-right:4px;}
  .mobile-meta strong{color:#FFB347;font-weight:600;font-size:10px;}
  .desktop-meta{display:none!important;}
  .header-right{display:none;}

  /* NAV */
  .nav{padding-left:0;overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .nav-btn{padding:10px 18px;font-size:13px;white-space:nowrap;}

  /* MAIN */
  .main{padding:10px 6px 16px;}

  /* KPI CARDS: 精简紧凑，2列 */
  .kpi-row,.kpi-row-5{grid-template-columns:repeat(2,1fr)!important;gap:6px!important;}
  .kpi-card{padding:8px 7px 6px;border-radius:8px;}
  .kpi-card .card-icon{display:none!important;}
  .kpi-card::after{height:2px;}
  .kpi-label{font-size:10px;margin-bottom:2px;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .kpi-value{font-size:20px;margin-bottom:2px;line-height:1;}
  .kpi-value .unit{font-size:9px;}
  .kpi-sub{font-size:8px;gap:2px;line-height:1.2;}
  .kpi-sub .yoy-up,.kpi-sub .yoy-down{font-size:9px;}
  .kpi-sub .yoy-na{display:none;}
  .progress-bar-wrap{display:none!important;}
  .badge{font-size:8px;padding:1px 4px;border-radius:8px;}

  /* SECTION */
  .section-title{font-size:13px;margin:12px 0 8px;}

  /* CHARTS */
  .chart-row,.chart-row-3{grid-template-columns:1fr!important;gap:8px!important;}
  .chart-box{padding:10px 8px;border-radius:8px;}
  .chart-box h3{font-size:12px;margin-bottom:6px;padding-bottom:6px;}
  .chart-box h3::before{height:10px;width:2px;}
  .chart-box canvas{max-height:220px;}

  /* TABLES: 紧凑化，减小 padding 让更多列可见 */
  .table-box{padding:10px 4px;border-radius:8px;margin-top:10px;}
  .table-box h3{font-size:12px;margin-bottom:8px;padding-bottom:6px;}
  .table-scroll-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -4px;}
  table{font-size:11px;}
  thead tr{background:#F7F9FC;}
  th{padding:5px 3px;font-size:9px;color:#5D6D7E;white-space:nowrap;border-bottom:1px solid #E8ECF4;letter-spacing:0;}
  td{padding:4px 3px;font-size:10px;white-space:nowrap;border-bottom:1px solid #F0F3F7;line-height:1.3;}
  tbody tr:nth-child(even) td{background:#FAFBFD;}
  .tbl-progress-bar{height:14px;min-width:40px;}
  .tbl-progress-text{font-size:8px;padding:0 2px;}
  .badge{font-size:8px;padding:1px 4px;border-radius:6px;}
  .area-tag{font-size:8px;padding:1px 4px;}
  /* 手机端列宽：大幅缩小 min-width */
  .tw-dept{min-width:55px;}
  .tw-empty{display:none!important;}
  .tw-num{min-width:60px;}
  .tw-badge{min-width:50px;}
  .tw-gap{min-width:55px;}
  .tw-prog{min-width:70px;}
  .tw-rank{min-width:28px;}
  .tw-region{min-width:55px;}
  .tw-owner{min-width:42px;}
  .tw-channel{min-width:36px;}

  /* FOOTER */
  .footer{font-size:9px;padding:8px 16px;}
}

@media(max-width:480px){
  .header-main-title{font-size:14px;}
  .nav-btn{padding:8px 14px;font-size:12px;}
  .nav-btn .nav-icon{display:none;}
  .kpi-value{font-size:18px;}
  .chart-box canvas{max-height:200px;}
}

</style>
</head>
<body>


<div class="header">

const fNum = (v) => v == null ? '0.00' : Number(v).toFixed(2);
const pct  = (a, b) => b === 0 ? null : ((a - b) / b * 100);

function yoyHtml(a, b) {
  const p = pct(a, b);
  if (p === null) return '<span class="yoy-na">N/A</span>';
  const sign = p >= 0 ? '+' : '';
  const cls  = p >= 0 ? 'yoy-up' : 'yoy-down';
  const arrow = p >= 0 ? '▲' : '▼';
  return `<span class="${cls}">${arrow} ${sign}${p.toFixed(1)}%</span> <span style="color:#AAB2BF">同比</span>`;
}

function getYtd(dept)    { return D.ytd.find(d => d.dept === dept) || {}; }
function getTarget(dept) { return D.target.find(d => d.dept === dept) || {}; }
function getMonthly(dept){ return D.deptMonthly.filter(d => d.dept === dept); }

function calcGap(ytd, target, m) {
  return ytd - (target / 12 * m);
}

function progressColor(p) {
  if (p >= 100) return '#27AE60';
  if (p >= 80)  return '#0A85E3';
  if (p >= 60)  return '#F5831F';
  return '#E74C3C';
}

function progressBarHtml(ytd, target, label) {
  if (!target) return '';
  const p = Math.min((ytd / target * 100), 100);
  const color = progressColor(ytd / target * 100);
  return `
  <div class="progress-bar-wrap">
    <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${p.toFixed(1)}%;background:${color};"></div></div>
    <div class="progress-bar-label"><span>${label} ${fNum(ytd)} / ${fNum(target)}</span><span style="color:${color};font-weight:600">${(ytd/target*100).toFixed(1)}%</span></div>
  </div>`;
}

function tableProgressHtml(prog) {
  const p = Math.min(Math.max(prog, 0), 100);
  const color = progressColor(prog);
  return `<div class="tbl-progress">
    <div class="tbl-progress-bar">
      <div class="tbl-progress-fill" style="width:${p.toFixed(1)}%;background:${color};">
        <span class="tbl-progress-text">${p.toFixed(1)}%</span>
      </div>
    </div>
  </div>`;
}

function buildKpiCards(dept) {
  const y = getYtd(dept);
  const t = getTarget(dept);
  const m = D.latestMonth;
  const gapAmt = calcGap(y.ytd2026Amt, t.targetAmt, m);
  const gapQty = calcGap(y.ytd2026Qty, t.targetQty, m);
  const pAmt   = t.targetAmt ? (y.ytd2026Amt / t.targetAmt * 100) : 0;
  const pQty   = t.targetQty ? (y.ytd2026Qty / t.targetQty * 100) : 0;
  const gapAmtColor = gapAmt >= 0 ? '#27AE60' : '#E74C3C';
  const gapQtyColor = gapQty >= 0 ? '#27AE60' : '#E74C3C';

  return `
  <div class="kpi-row">
    <div class="kpi-card type-blue">
      <div class="card-icon">💰</div>
      <div class="kpi-label">2026年累计发货金额</div>
      <div class="kpi-value">${fNum(y.ytd2026Amt)}<span class="unit">万元</span></div>
      <div class="kpi-sub">${yoyHtml(y.ytd2026Amt, y.ytd2025Amt)}</div>
      ${progressBarHtml(y.ytd2026Amt, t.targetAmt, '进度')}
    </div>
    <div class="kpi-card type-orange">
      <div class="card-icon">📦</div>
      <div class="kpi-label">2026年累计发货数量</div>
      <div class="kpi-value">${fNum(y.ytd2026Qty)}<span class="unit">万盒</span></div>
      <div class="kpi-sub">${yoyHtml(y.ytd2026Qty, y.ytd2025Qty)}</div>
      ${progressBarHtml(y.ytd2026Qty, t.targetQty, '进度')}
    </div>
    <div class="kpi-card type-teal">
      <div class="card-icon">🎯</div>
      <div class="kpi-label">目标进度差距（金额）</div>
      <div class="kpi-value" style="color:${gapAmtColor}">${gapAmt>=0?'+':''}${fNum(gapAmt)}<span class="unit">万元</span></div>
      <div class="kpi-sub">
        <span class="badge ${pAmt>=100?'badge-green':pAmt>=80?'badge-blue':pAmt>=60?'badge-orange':'badge-red'}">
          完成 ${pAmt.toFixed(1)}%
        </span>
        <span>全年目标 ${fNum(t.targetAmt)} 万</span>
      </div>
    </div>
    <div class="kpi-card type-purple">
      <div class="card-icon">📊</div>
      <div class="kpi-label">目标进度差距（数量）</div>
      <div class="kpi-value" style="color:${gapQtyColor}">${gapQty>=0?'+':''}${fNum(gapQty)}<span class="unit">万盒</span></div>
      <div class="kpi-sub">
        <span class="badge ${pQty>=100?'badge-green':pQty>=80?'badge-blue':pQty>=60?'badge-orange':'badge-red'}">
          完成 ${pQty.toFixed(1)}%
        </span>
        <span>全年目标 ${fNum(t.targetQty)} 万盒</span>
      </div>
    </div>
  </div>`;
}

function buildDeptCards(dept) {
  const areas = D.areaYtd.filter(a => a.dept === dept);
  const areaTargets = D.areaTarget.filter(a => a.dept === dept);
  const m = D.latestMonth;
  const typeMap = { '华东':'type-blue','华北':'type-orange','华南':'type-green','华西':'type-purple', '新营销部':'type-teal' };
  const iconMap = { '华东':'🌊','华北':'🏔','华南':'🌴','华西':'🏜', '新营销部':'🚀' };

  let cards = areas.map(a => {
    const t = areaTargets.find(at => at.area === a.area) || {};
    const gap = calcGap(a.ytd2026Amt, t.targetAmt || 0, m);
    const prog = (t.targetAmt || 0) ? (a.ytd2026Amt / t.targetAmt * 100) : 0;
    const typ  = typeMap[a.area] || 'type-blue';
    const icon = iconMap[a.area] || '📌';
    return `
    <div class="kpi-card ${typ}">
      <div class="card-icon">${icon}</div>
      <div class="kpi-label">${a.area} · 累计金额</div>
      <div class="kpi-value">${fNum(a.ytd2026Amt)}<span class="unit">万元</span></div>
      <div class="kpi-sub">${yoyHtml(a.ytd2026Amt, a.ytd2025Amt)}</div>
      ${progressBarHtml(a.ytd2026Amt, t.targetAmt, '进度')}
    </div>`;
  }).join('');

  const gridClass = areas.length <= 4 ? 'kpi-row' : 'kpi-row-5';
  return `<div class="${gridClass}">${cards}</div>`;
}

const isMobile = window.innerWidth <= 768;
const baseFontSize = isMobile ? 11 : 16;
const defaultFont = { family:"'Microsoft YaHei','PingFang SC',sans-serif", size:baseFontSize };
const gridColor   = 'rgba(0,0,0,0.06)';

function baseOptions(unit) {
  return {
    responsive:true, maintainAspectRatio:false,
    plugins:{
      legend:{ position:'top', labels:{ font:defaultFont, padding:isMobile?8:16, usePointStyle:true, pointStyleWidth:isMobile?6:10 } },
      tooltip:{ backgroundColor:'rgba(0,104,200,0.92)', titleFont:{...defaultFont,size:baseFontSize,weight:'bold'},
        bodyFont:defaultFont, padding:isMobile?6:10, cornerRadius:8,
        callbacks:{ label: ctx => ` ${ctx.dataset.label}: ${ctx.raw==null?'—':Number(ctx.raw).toFixed(2)} ${unit}` }
      }
    },
    scales:{
      x:{ grid:{color:gridColor}, ticks:{font:defaultFont} },
      y:{ beginAtZero:true, grid:{color:gridColor}, ticks:{font:defaultFont, callback: v=>v } }
    }
  };
}

function createMonthlyChart(canvasId, dept, metric) {
  destroyChart(canvasId);
  const data = getMonthly(dept);
  const allM = Array.from({length:12},(_,i)=>i+1);
  const labels = allM.map(m => m+'月');
  const v25 = allM.map(m => { const r=data.find(d=>d.year===2025&&d.month===m); return r?r[metric]:0; });
  const v26 = allM.map(m => { const r=data.find(d=>d.year===2026&&d.month===m); return r?r[metric]:null; });
  const unit = metric==='amt'?'万元':'万盒';
  const ctx = document.getElementById(canvasId).getContext('2d');
  const bar2026Color = metric === 'qty' ? C.blue2A : C.orangeA;
  const isGrouped = metric === 'qty';

  // 计算目标均值线
  const t = getTarget(dept);
  const annualTarget = metric === 'qty' ? t.targetQty : t.targetAmt;
  const monthlyAvg = annualTarget ? (annualTarget / 12) : 0;
  const avgLine = allM.map(() => monthlyAvg);

  const datasets = [
    { label:'2025年', data:v25, backgroundColor:C.grayA, borderRadius:isGrouped?8:5, barPercentage:isGrouped?0.85:0.38, categoryPercentage:isGrouped?0.98:0.7 },
    { label:'2026年', data:v26, backgroundColor:bar2026Color, borderRadius:isGrouped?8:5, barPercentage:isGrouped?0.85:0.38, categoryPercentage:isGrouped?0.98:0.7 }
  ];
  if (monthlyAvg > 0) {
    datasets.push({
      label:'目标均值('+unit+'/月)', data:avgLine, type:'line',
      borderColor:C.orange, borderWidth:2, borderDash:[6,4],
      pointRadius:0, fill:false, order:0
    });
  }

  chartInstances[canvasId] = new Chart(ctx, {
    type:'bar',
    data:{ labels, datasets },
    options: {
      ...baseOptions(unit),
      plugins:{
        ...baseOptions(unit).plugins,
        legend:{ ...baseOptions(unit).plugins.legend }
      }
    }
  });
}

function createCumulativeChart(canvasId, dept, metric) {
  destroyChart(canvasId);
  const data = getMonthly(dept);
  const allM = Array.from({length:12},(_,i)=>i+1);
  const labels = allM.map(m=>m+'月');
  function cum(yr) {
    let s=0;
    return allM.map(m=>{
      const r=data.find(d=>d.year===yr&&d.month===m);
      s+=r?r[metric]:0;
      return r?s:null;
    });
  }
  const v25=cum(2025), v26=cum(2026);
  const unit=metric==='amt'?'万元':'万盒';
  const ctx=document.getElementById(canvasId).getContext('2d');

  const datasets = [
    { label:'2025年累计', data:v25, borderColor:C.blue2, backgroundColor:'rgba(10,133,227,0.08)',
      fill:true, tension:0.35, pointRadius:3, pointBackgroundColor:C.blue2,
      borderWidth:2.5 },
    { label:'2026年累计', data:v26, borderColor:C.orange, backgroundColor:'rgba(245,131,31,0.10)',
      fill:true, tension:0.35, pointRadius:4, pointBackgroundColor:C.orange,
      borderWidth:2.5 }
  ];

  const t = getTarget(dept);
  const annualTarget = metric === 'qty' ? t.targetQty : t.targetAmt;
  if (metric === 'qty' && annualTarget) {
    const tgtLine = allM.map(m => (annualTarget / 12 * m).toFixed(2));
    datasets.push({
      label:'全年目标线', data:tgtLine, type:'line',
      borderColor:'#E74C3C', borderWidth:2, borderDash:[8,5],
      pointRadius:0, fill:false, order:0
    });
  }

  const gapPlugin = {
    id: 'gapLabel',
    afterDatasetsDraw(chart) {
      const ds26 = chart.data.datasets[1];
      const dsIdx26 = 1;
      const meta26 = chart.getDatasetMeta(dsIdx26);
      let lastIdx = -1, lastVal = 0;
      for (let i = ds26.data.length - 1; i >= 0; i--) {
        if (ds26.data[i] != null) { lastIdx = i; lastVal = ds26.data[i]; break; }
      }
      if (lastIdx < 0) return;
      const m = lastIdx + 1;
      const targetVal = annualTarget / 12 * m;
      const gap = lastVal - targetVal;
      const sign = gap >= 0 ? '+' : '';
      const color = gap >= 0 ? '#27AE60' : '#E74C3C';
      const pt = meta26.data[lastIdx];
      if (!pt) return;
      const cctx = chart.ctx;
      cctx.save();
      cctx.font = 'bold '+baseFontSize+'px Microsoft YaHei, sans-serif';
      cctx.fillStyle = color;
      cctx.textAlign = 'left';
      cctx.textBaseline = 'bottom';
      cctx.fillText('差距 ' + sign + gap.toFixed(2), pt.x + 8, pt.y - 4);
      cctx.restore();
    }
  };

  chartInstances[canvasId]=new Chart(ctx,{
    type:'line',
    data:{ labels, datasets },
    options:baseOptions(unit),
    plugins: metric === 'qty' ? [gapPlugin] : []
  });
}

function createAreaPieChart(canvasId, dept) {
  destroyChart(canvasId);
  const areas = D.areaYtd.filter(a=>a.dept===dept);
  // 新营销部按B端/C端/KA大区从地区数据汇总
  const isQty = (dept === '新营销部');
  let labels, values, unit;
  if (isQty) {
    unit = '万盒';
    const m = D.latestMonth;
    const regions = D.regionTarget.filter(r=>r.dept===dept);
    const areaMap = {};
    regions.forEach(r => {
      if (!areaMap[r.area]) areaMap[r.area] = 0;
      D.regionMonthly2026.filter(md=>md.region===r.region&&md.month<=m).forEach(md=>areaMap[r.area]+=md.qty);
    });
    labels = Object.keys(areaMap);
    values = labels.map(l=>areaMap[l]);
  } else {
    unit = '万元';
    labels = areas.map(a=>a.area);
    values = areas.map(a=>a.ytd2026Amt);
  }
  const total=values.reduce((a,b)=>a+b,0);
  const ctx=document.getElementById(canvasId).getContext('2d');
  // 新营销部KA用灰色，B端蓝，C端橙
  const bgColors = isQty
    ? labels.map(l => l==='KA' ? 'rgba(149,165,166,0.82)' : l==='C端' ? 'rgba(245,131,31,0.82)' : 'rgba(0,104,200,0.82)')
    : C.pieColors;
  chartInstances[canvasId]=new Chart(ctx,{
    type:'doughnut',
    data:{ labels, datasets:[{
      data:values, backgroundColor:bgColors, borderWidth:3, borderColor:'#fff',
      hoverBorderWidth:0
    }]},
    options:{
      responsive:true, maintainAspectRatio:false,
      cutout:'62%',
      layout:{ padding:{ top:30, bottom:10, left:10, right:10 } },
      plugins:{
        legend:{ position:'right', labels:{font:{...defaultFont,size:baseFontSize},padding:isMobile?6:14,usePointStyle:true,pointStyleWidth:isMobile?6:10} },
        tooltip:{ backgroundColor:'rgba(0,104,200,0.92)', titleFont:{...defaultFont,size:baseFontSize,weight:'bold'},
          bodyFont:{...defaultFont}, padding:isMobile?6:10, cornerRadius:8,
          callbacks:{ label: ctx => ` ${ctx.label}: ${Number(ctx.raw).toFixed(2)} ${unit} (${(ctx.raw/total*100).toFixed(1)}%)` }
        },
        datalabels:{
          color:'#333',
          font:{ weight:'bold', size:isMobile?10:14, family:"'Microsoft YaHei','PingFang SC',sans-serif" },
          backgroundColor:'rgba(255,255,255,0.8)',
          borderRadius:4,
          borderColor:'rgba(0,0,0,0.1)',
          borderWidth:1,
          padding:{ top:4, bottom:4, left:8, right:8 },
          formatter:(value, ctx) => {
            const pct = (value/total*100).toFixed(1);
            return value.toFixed(1) + unit + '\n' + pct + '%';
          },
          textAlign:'center',
          clip:false,
          anchor:'end',
          align:'end',
          offset:8,
          connectorColor:'#999',
          connectorWidth:1.5,
          connectorPadding:6,
          display:function(ctx2){
            return ctx2.dataset.data[ctx2.dataIndex] / total > 0.03;
          }
        }
      }
    },
    plugins:[ChartDataLabels]
  });
}

function createAreaBarChart(canvasId, dept) {
  if (dept === '新营销部') {
    createChannelYoYChart(canvasId, dept);
    return;
  }
  destroyChart(canvasId);
  const areas   = D.areaYtd.filter(a=>a.dept===dept);
  const targets = D.areaTarget.filter(a=>a.dept===dept);
  const labels  = areas.map(a=>a.area);
  const ytd25   = areas.map(a=>a.ytd2025Amt);
  const ytd26   = areas.map(a=>a.ytd2026Amt);
  const tgtLine = labels.map(l=>{ const t=targets.find(x=>x.area===l); return t?t.targetAmt/12*D.latestMonth:0; });
  const ctx=document.getElementById(canvasId).getContext('2d');
  chartInstances[canvasId]=new Chart(ctx,{
    type:'bar',
    data:{ labels, datasets:[
      { label:'2025年同期', data:ytd25, backgroundColor:C.grayA, borderRadius:5, barPercentage:0.28, categoryPercentage:0.75 },
      { label:'2026年累计', data:ytd26, backgroundColor:C.blue2A, borderRadius:5, barPercentage:0.28, categoryPercentage:0.75 },
      { label:'目标进度线', data:tgtLine, type:'line', borderColor:C.orange, borderWidth:2,
        borderDash:[7,4], pointRadius:4, pointBackgroundColor:C.orange, fill:false }
    ]},
    options:baseOptions('万元')
  });
}

function createChannelYoYChart(canvasId, dept) {
  destroyChart(canvasId);
  const m = D.latestMonth;
  const regions = D.regionTarget.filter(r=>r.dept===dept);
  const channels = [...new Set(regions.map(r=>r.area))].sort();
  // 每个渠道的2025和2026年YTD数量
  const qty25 = {}, qty26 = {};
  channels.forEach(ch => {
    qty25[ch] = 0; qty26[ch] = 0;
    const chRegions = regions.filter(r=>r.area===ch);
    chRegions.forEach(r => {
      D.regionMonthly2025.filter(md=>md.region===r.region&&md.month<=m).forEach(md=>qty25[ch]+=md.qty);
      D.regionMonthly2026.filter(md=>md.region===r.region&&md.month<=m).forEach(md=>qty26[ch]+=md.qty);
    });
  });
  const chColors = {
    'B端': { light: 'rgba(0,104,200,0.60)', solid: 'rgba(0,104,200,0.90)' },
    'C端': { light: 'rgba(245,131,31,0.60)', solid: 'rgba(245,131,31,0.90)' },
    'KA':  { light: 'rgba(149,165,166,0.60)', solid: 'rgba(149,165,166,0.90)' }
  };
  const datasets = channels.map(ch => ({
    label: ch,
    data: [qty25[ch], qty26[ch]],
    backgroundColor: chColors[ch]?.solid || 'rgba(200,200,200,0.80)',
    hoverBackgroundColor: chColors[ch]?.solid || 'rgba(200,200,200,0.95)',
    borderRadius: 5,
    barPercentage: 0.7,
    categoryPercentage: 0.65
  }));

  // 柱顶标注数值和同比
  const topLabelPlugin = {
    id: 'topLabel',
    afterDatasetsDraw(chart) {
      const cctx = chart.ctx;
      cctx.save();
      cctx.font = 'bold '+Math.max(baseFontSize-2,10)+'px Microsoft YaHei, sans-serif';
      cctx.textAlign = 'center';
      cctx.textBaseline = 'bottom';
      channels.forEach((ch, i) => {
        const meta = chart.getDatasetMeta(i);
        const bar25 = meta.data[0], bar26 = meta.data[1];
        if (bar25) { cctx.fillStyle='#888'; cctx.fillText(qty25[ch].toFixed(2), bar25.x, bar25.y - 2); }
        if (bar26) {
          const yoy = qty25[ch] ? ((qty26[ch]-qty25[ch])/qty25[ch]*100) : 0;
          const sign = yoy >= 0 ? '+' : '';
          cctx.fillStyle = yoy >= 0 ? '#27AE60' : '#E74C3C';
          cctx.fillText(`${qty26[ch].toFixed(2)} (${sign}${yoy.toFixed(1)}%)`, bar26.x, bar26.y - 2);
        }
      });
      cctx.restore();
    }
  };

  const ctx = document.getElementById(canvasId).getContext('2d');
  chartInstances[canvasId] = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ['2025年同期', '2026年累计'],
      datasets
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        x: {
          grid: { display: false },
          ticks: { font: { ...defaultFont, size: baseFontSize, weight: 'bold' } }
        },
        y: {
          grid: { color: gridColor },
          ticks: { font: defaultFont, callback: v => v + '万盒' },
          beginAtZero: true
        }
      },
      plugins: {
        legend: {
          position: 'top',
          labels: { font: defaultFont, padding: isMobile?6:14, usePointStyle: true, pointStyleWidth: isMobile?6:10 }
        },
        tooltip: {
          backgroundColor: 'rgba(0,104,200,0.92)',
          titleFont: { ...defaultFont, size: baseFontSize, weight: 'bold' },
          bodyFont: defaultFont, padding: isMobile?6:10, cornerRadius: 8,
          callbacks: {
            title: items => items[0].label,
            label: ctx => ` ${ctx.dataset.label}: ${Number(ctx.raw).toFixed(2)} 万盒`
          }
        }
      }
    },
    plugins: [topLabelPlugin]
  });
}

/* ===== AREA COLOR CLASS ===== */
function areaTagClass(area) {
  if(area.includes('华东')) return 'area-huadong';
  if(area.includes('华北')) return 'area-huabei';
  if(area.includes('华南')) return 'area-huanan';
  if(area.includes('华西')) return 'area-huaxi';
  if(area.includes('新营销')) return 'area-xinyx';
  return 'area-default';
}

function buildRegionTable(dept) {
  const m = D.latestMonth;
  if (dept === '全部') {
    // 总览页：按部门汇总，用数量(万盒)
    const depts = D.target.filter(t=>t.dept!=='全部');
    const colHeaders = ['部门','','全年目标','累计完成','同比增长率','目标差距','完成进度'];
    let rows = depts.map(t => {
      const cum26 = D.deptMonthly.filter(d=>d.dept===t.dept&&d.year===D.latestYear&&d.month<=m).reduce((s,d)=>s+d.qty,0);
      const cum25 = D.deptMonthly.filter(d=>d.dept===t.dept&&d.year===2025&&d.month<=m).reduce((s,d)=>s+d.qty,0);
      const target = t.targetQty;
      const gap   = calcGap(cum26, target, m);
      const prog  = target ? (cum26/target*100) : 0;
      const yoyP  = cum25>0 ? ((cum26-cum25)/cum25*100) : null;
      const yoyCls= yoyP===null?'badge-gray':yoyP>=0?'badge-red':'badge-green';
      const yoyTxt= yoyP===null?'N/A':(yoyP>=0?'+':'')+yoyP.toFixed(1)+'%';
      return `<tr>
        <td class="tw-dept" style="font-weight:500">${t.dept}</td>
        <td class="tw-empty"></td>
        <td class="tw-num">${fNum(target)}</td>
        <td class="tw-num" style="font-weight:600;color:#0068C8">${fNum(cum26)}</td>
        <td class="tw-badge"><span class="badge ${yoyCls}">${yoyTxt}</span></td>
        <td class="tw-gap"><span style="color:${gap>=0?'#27AE60':'#E74C3C'};font-weight:600">${gap>=0?'+':''}${fNum(gap)}</span></td>
        <td class="tw-prog">${tableProgressHtml(prog)}</td>
      </tr>`;
    }).join('');
    return `<div class="table-box">
      <h3>各部门目标完成明细</h3>
      <div class="table-scroll-wrap">
      <table>
        <thead><tr>
          <th class="tw-dept">部门</th>
          <th class="tw-empty"></th>
          <th class="tw-num">目标(万盒)</th>
          <th class="tw-num">完成(万盒)</th>
          <th class="tw-badge">同比增长</th>
          <th class="tw-gap">差距(万盒)</th>
          <th class="tw-prog">进度</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
      </div>
    </div>`;
  }
  // 非总览：按地区明细
  const regions = D.regionTarget.filter(r=>r.dept===dept);

  if (dept === '医院销售部') {
    // 医院销售部：按数量(万盒)统计，排名降序，显示负责人
    // 月度列：2026M1 ~ 2026M当月
    const monthCols = Array.from({length: m}, (_, i) => i + 1);
    let regionData = regions.map(r => {
      let cum25=0; D.regionMonthly2025.filter(md=>md.region===r.region&&md.month<=m).forEach(md=>cum25+=md.qty);
      let cum26=0; D.regionMonthly2026.filter(md=>md.region===r.region&&md.month<=m).forEach(md=>cum26+=md.qty);
      // 各月销量
      const monthlyQty = monthCols.map(mo => {
        const md = D.regionMonthly2026.find(d=>d.region===r.region&&d.month===mo);
        return md ? md.qty : 0;
      });
      return { ...r, cum25, cum26, monthlyQty };
    });
    // 按销售量降序排列
    regionData.sort((a, b) => b.cum26 - a.cum26);
    const medals = ['🥇','🥈','🥉'];
    // 月度列表头
    const monthHeaders = monthCols.map(mo => `<th class="tw-num">2026M${mo}</th>`).join('');
    let rows = regionData.map((r, idx) => {
      const rank = idx + 1;
      const gap   = calcGap(r.cum26, r.targetQty, m);
      const prog  = r.targetQty ? (r.cum26/r.targetQty*100) : 0;
      const yoyP  = r.cum25>0 ? ((r.cum26-r.cum25)/r.cum25*100) : null;
      const yoyCls= yoyP===null?'badge-gray':yoyP>=0?'badge-red':'badge-green';
      const yoyTxt= yoyP===null?'N/A':(yoyP>=0?'+':'')+yoyP.toFixed(1)+'%';
      const rankDisplay = rank <= 3 ? medals[rank-1] : rank;
      const monthlyCells = r.monthlyQty.map(v => `<td class="tw-num">${v>0?fNum(v):'-'}</td>`).join('');
      return `<tr>
        <td class="tw-rank">${rankDisplay}</td>
        <td class="tw-region">${r.region}</td>
        <td class="tw-owner">${r.owner || '-'}</td>
        <td class="tw-num">${fNum(r.targetQty)}</td>
        <td class="tw-num" style="font-weight:600;color:#0068C8">${fNum(r.cum26)}</td>
        <td class="tw-badge"><span class="badge ${yoyCls}">${yoyTxt}</span></td>
        <td class="tw-gap"><span style="color:${gap>=0?'#27AE60':'#E74C3C'};font-weight:600">${gap>=0?'+':''}${fNum(gap)}</span></td>
        <td class="tw-prog">${tableProgressHtml(prog)}</td>
        ${monthlyCells}
      </tr>`;
    }).join('');
    return `<div class="table-box">
      <h3>各地区目标完成明细（${D.latestYear}年1-${m}月累计·数量万盒）</h3>
      <div class="table-scroll-wrap">
      <table>
        <thead><tr>
          <th class="tw-rank">排名</th>
          <th class="tw-region">地区</th>
          <th class="tw-owner">负责人</th>
          <th class="tw-num">目标(万盒)</th>
          <th class="tw-num">完成(万盒)</th>
          <th class="tw-badge">同比</th>
          <th class="tw-gap">差距</th>
          <th class="tw-prog">进度</th>
          ${monthHeaders}
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
      </div>
    </div>`;
  }

  // 新营销部：按数量统计，显示地区负责人
  // 月度列：2026M1月 ~ 2026M当月
  const monthCols = Array.from({length: m}, (_, i) => i + 1);
  const monthHeaders = monthCols.map(mo => `<th class="tw-num">2026M${mo}</th>`).join('');
  let rows = regions.map(r => {
    let cum25=0; D.regionMonthly2025.filter(md=>md.region===r.region&&md.month<=m).forEach(md=>cum25+=md.qty);
    let cum26=0; D.regionMonthly2026.filter(md=>md.region===r.region&&md.month<=m).forEach(md=>cum26+=md.qty);
    const gap   = calcGap(cum26, r.targetQty, m);
    const prog  = r.targetQty ? (cum26/r.targetQty*100) : 0;
    const yoyP  = cum25>0 ? ((cum26-cum25)/cum25*100) : null;
    const yoyCls= yoyP===null?'badge-gray':yoyP>=0?'badge-red':'badge-green';
    const yoyTxt= yoyP===null?'N/A':(yoyP>=0?'+':'')+yoyP.toFixed(1)+'%';
    const monthlyCells = monthCols.map(mo => {
      const md = D.regionMonthly2026.find(d=>d.region===r.region&&d.month===mo);
      const v = md ? md.qty : 0;
      return `<td class="tw-num">${v>0?fNum(v):'-'}</td>`;
    }).join('');
    return `<tr>
      <td class="tw-region">${r.region}</td>
      <td class="tw-owner">${r.owner || '-'}</td>
      <td class="tw-channel"><span class="area-tag ${areaTagClass(r.area)}">${r.area}</span></td>
      <td class="tw-num">${fNum(r.targetQty)}</td>
      <td class="tw-num" style="font-weight:600;color:#0068C8">${fNum(cum26)}</td>
      <td class="tw-badge"><span class="badge ${yoyCls}">${yoyTxt}</span></td>
      <td class="tw-gap"><span style="color:${gap>=0?'#27AE60':'#E74C3C'};font-weight:600">${gap>=0?'+':''}${fNum(gap)}</span></td>
      <td class="tw-prog">${tableProgressHtml(prog)}</td>
      ${monthlyCells}
    </tr>`;
  }).join('');
  return `<div class="table-box">
    <h3>各地区目标完成明细（${D.latestYear}年1-${m}月累计·数量万盒）</h3>
    <div class="table-scroll-wrap">
    <table>
      <thead><tr>
        <th class="tw-region">地区</th>
        <th class="tw-owner">负责人</th>
        <th class="tw-channel">渠道</th>
        <th class="tw-num">目标(万盒)</th>
        <th class="tw-num">完成(万盒)</th>
        <th class="tw-badge">同比</th>
        <th class="tw-gap">差距</th>
        <th class="tw-prog">进度</th>
        ${monthHeaders}
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
    </div>
  </div>`;
}

function buildDeptPage(dept, pageId) {
  const container = document.getElementById(pageId);
  const hasAreas  = D.areaYtd.filter(a=>a.dept===dept).length > 0;
  const areaLabel = dept==='医院销售部' ? '大区' : '渠道';
  const uid       = dept==='全部'?'ov':dept==='医院销售部'?'hosp':'mkt';
  let html = '';

  html += `<div class="section-title">核心指标总览</div>`;
  html += buildKpiCards(dept);

  if (dept === '全部') {
    html += buildRegionTable(dept);
  }

  // 医院销售部和新营销部不显示渠道/大区维度KPI
  if (hasAreas && dept === '总览') {
    // 仅总览页可展示（当前总览页用部门表格替代）
  }

  html += `<div class="section-title">月度发货趋势对比</div>`;
  html += `<div class="chart-row">
    <div class="chart-box"><h3>月度发货数量对比（万盒）</h3><div style="height:300px"><canvas id="${uid}-qty-bar"></canvas></div></div>
    <div class="chart-box"><h3>累计发货数量趋势（万盒）</h3><div style="height:300px"><canvas id="${uid}-qty-cum"></canvas></div></div>
  </div>`;


  // 大区/渠道维度分析图表
  if (hasAreas && dept !== '医院销售部') {
    const chartTitle = dept === '新营销部'
      ? '各渠道销量占比（万盒）'
      : `各${areaLabel}累计金额占比（万元）`;
    const barTitle = dept === '新营销部'
      ? '各渠道销量同比情况'
      : `各${areaLabel}发货金额 vs 目标进度线`;
    html += `<div class="section-title">${areaLabel}维度分析</div>`;
    html += `<div class="chart-row">
      <div class="chart-box"><h3>${chartTitle}</h3><div style="height:300px"><canvas id="${uid}-pie"></canvas></div></div>
      <div class="chart-box"><h3>${barTitle}</h3><div style="height:300px"><canvas id="${uid}-area-bar"></canvas></div></div>
    </div>`;
  }

  if (dept !== '全部') {
    html += buildRegionTable(dept);
  }

  container.innerHTML = html;

  setTimeout(() => {
    createMonthlyChart(uid+'-qty-bar', dept, 'qty');
    createCumulativeChart(uid+'-qty-cum', dept, 'qty');
    if(hasAreas && dept !== '医院销售部'){ createAreaPieChart(uid+'-pie',dept); createAreaBarChart(uid+'-area-bar',dept); }
  }, 50);
}

function switchPage(page) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const map = { overview:['page-overview',0,'全部'], hospital:['page-hospital',1,'医院销售部'], marketing:['page-marketing',2,'新营销部'] };
  const [pid, idx, dept] = map[page];
  document.getElementById(pid).classList.add('active');
  document.querySelectorAll('.nav-btn')[idx].classList.add('active');
  buildDeptPage(dept, pid);
}

switchPage('overview');

// Simple toast notification
function showToast(msg, type) {
  let existing = document.getElementById('_toast');
  if (existing) existing.remove();
  const t = document.createElement('div');
  t.id = '_toast';
  t.style.cssText = 'position:fixed;top:100px;left:50%;transform:translateX(-50%);' +
    'padding:10px 24px;border-radius:10px;font-size:14px;z-index:99999;' +
    'box-shadow:0 4px 20px rgba(0,0,0,.15);transition:opacity .4s;';
  if (type === 'ok') { t.style.background = '#27AE60'; t.style.color = '#fff'; }
  else { t.style.background = '#0068C8'; t.style.color = '#fff'; }
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 400); }, 2000);
}


/* ===== AUTO SCALE for embedded/iframe display ===== */
/* Mobile-first: if width <= 768, skip scaling and use responsive CSS layout */
(function(){
  var REF_W = 1440;
  function applyScale() {
    var w = window.innerWidth || document.documentElement.clientWidth || 960;
    if(w <= 768) {
      /* Mobile: remove any scaling, let CSS media queries handle layout */
      document.body.style.width = '';
      document.body.style.transform = '';
      return;
    }
    var scale = Math.min(1, w / REF_W);
    if(scale < 1) {
      document.body.style.transformOrigin = 'top left';
      document.body.style.width = (100/scale) + '%';
      document.body.style.transform = 'scale(' + scale + ')';
    } else {
      document.body.style.width = '';
      document.body.style.transform = '';
    }
  }
  applyScale();
  window.addEventListener('resize', applyScale);
})();
</script>
